<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Hotel Balo</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:  #15202E;
      --sky:   #2580C8;
      --terra: #C4804A;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--navy);
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      color: rgba(255,255,255,0.85);
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem; color: rgba(255,255,255,0.9);
      margin: 0 0 3rem; letter-spacing: -0.01em;
    }
    .code {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      color: var(--sky);
      line-height: 1; margin: 0 0 1rem;
      text-shadow: 0 0 60px rgba(37,128,200,0.3);
    }
    .msg {
      font-size: 1.25rem; font-weight: 500;
      color: rgba(255,255,255,0.75); margin: 0 0 0.5rem;
    }
    .sub {
      font-size: 0.95rem; color: rgba(255,255,255,0.45);
      margin: 0 0 3rem; max-width: 360px;
    }
    .btn-home {
      display: inline-block;
      background: var(--sky); color: #fff;
      padding: 0.875rem 2rem; border-radius: 0.5rem;
      font-weight: 600; font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-home:hover { background: #3A94DC; transform: translateY(-2px); }
    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--terra), var(--sky));
      border-radius: 2px; margin: 2rem auto;
    }
  </style>
</head>
<body>
  <img src="./img/logo.png" alt="Hotel Balo" style="max-height:64px; width:auto; background:#fff; padding:7px 14px; border-radius:6px; margin:0 auto 2rem; display:block;" />
  <p class="code">404</p>
  <p class="msg">Esta página no existe.</p>
  <p class="sub">El contenido que buscás no fue encontrado o fue movido.</p>
  <div class="divider"></div>
  <a href="./index.html" class="btn-home">← Volver al inicio</a>
</body>
</html>
