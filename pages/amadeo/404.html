<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Amadeo Café</title>
  <link rel="icon" href="./img/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1C1C1A;
      color: #fff;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: 1.5rem;
    }
    .logo img {
      width: 120px; height: auto; display: block;
      filter: brightness(0) invert(1); opacity: 0.6;
    }
    .error-code {
      font-family: 'Fraunces', serif; font-weight: 900;
      font-size: clamp(6rem, 20vw, 10rem);
      line-height: 1; letter-spacing: -0.04em;
      color: #6B7A6D;
    }
    .message { font-size: 1rem; color: rgba(255,255,255,0.5); max-width: 300px; line-height: 1.6; font-weight: 300; }
    .btn {
      display: inline-block; background: #6B7A6D; color: #fff;
      font-family: 'Fraunces', serif; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 0.04em;
      text-decoration: none; padding: 0.9rem 2.5rem;
      border-radius: 6px; margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn:hover { background: #58675A; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="./img/logo.png" alt="Amadeo Café">
  </div>
  <div class="error-code">404</div>
  <p class="message">Esta página no existe.</p>
  <a href="./index.html" class="btn">Volver al inicio</a>
</body>
</html>
