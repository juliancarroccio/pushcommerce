<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú — El Sabor de Mamá</title>
  <link rel="icon" href="./img/logo.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --noir: #0C0C0C;
      --slate: #161618;
      --card: #1E1E20;
      --border: #2A2A2E;
      --gold: #F4BD4D;
      --gold-dark: #C4952A;
      --cream: #F0EAD8;
      --muted: #7A7060;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--noir); color: var(--cream);
      margin: 0; overflow-x: hidden;
    }
    h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

    /* Scroll progress */
    #scroll-progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      z-index: 9999;
    }

    /* Header */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,12,12,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-main {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1rem; height: 60px;
    }
    .btn-back {
      color: var(--muted); text-decoration: none; font-size: 1.4rem;
      line-height: 1; transition: color 0.2s; flex-shrink: 0;
    }
    .btn-back:hover { color: var(--gold); }
    .header-brand {
      display: flex; align-items: center; gap: 0.6rem; flex: 1;
    }
    .header-brand img { height: 32px; border-radius: 4px; }
    .header-brand span {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; color: var(--cream);
    }
    .btn-cart {
      position: relative; background: var(--card);
      border: 1px solid var(--border);
      color: var(--cream); font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.85rem;
      padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-cart.has-items { background: var(--gold); color: var(--noir); border-color: var(--gold); }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: #f87171; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    /* Category pills */
    .pills-strip {
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      overflow-x: auto; display: flex; gap: 0.5rem;
      scrollbar-width: none;
    }
    .pills-strip::-webkit-scrollbar { display: none; }
    .pill {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: 'Manrope', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      padding: 0.35rem 0.9rem; border-radius: 99px; cursor: pointer;
      white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
    }
    .pill.active, .pill:hover { background: var(--gold); border-color: var(--gold); color: var(--noir); }

    /* Search */
    .search-strip {
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; gap: 0.5rem;
    }
    .search-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      color: var(--cream); font-family: 'Manrope', sans-serif; font-size: 0.9rem;
      padding: 0.5rem 0.875rem; border-radius: 8px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--muted); }
    .btn-clear {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem;
      padding: 0.5rem 0.75rem; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; display: none;
    }
    .btn-clear:hover { color: var(--cream); }

    /* Banners */
    #status-banner {
      margin: 0.75rem 1rem; padding: 0.75rem 1rem;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
    }
    #status-banner.abierto { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    #status-banner.cerrado { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }

    /* Catálogo */
    #catalogo { padding: 0 1rem 8rem; max-width: 900px; margin: 0 auto; }
    .cat-section { margin-bottom: 2.5rem; }
    .cat-section.hidden-cat { display: none; }
    .cat-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1.25rem 0 0.875rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .pcard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .pcard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .pcard:hover {
      border-color: rgba(244,189,77,0.35);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
    .pcard-emoji-wrap {
      aspect-ratio: 4/3; display: flex;
      align-items: center; justify-content: center;
      font-size: 3.5rem; background: var(--slate);
    }
    .pcard-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .pcard-body h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: #fff;
      margin: 0 0 0.35rem;
    }
    .pcard-body p { font-size: 0.8rem; color: var(--muted); margin: 0 0 0.875rem; flex: 1; line-height: 1.5; }
    .pcard-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .pcard-price {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 800; color: var(--gold);
    }
    .btn-add {
      background: var(--gold); color: var(--noir);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-add:hover { background: var(--gold-dark); transform: scale(1.04); }
    .pcard.hidden { display: none; }

    /* Skeleton */
    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
    .sk-block { background: var(--card); border-radius: 6px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Cart drawer */
    #cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #cart-overlay.open { opacity: 1; pointer-events: all; }
    #cart-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--slate); border-left: 1px solid var(--border);
      z-index: 201; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #cart-drawer.open { transform: translateX(0); }
    .cart-header {
      padding: 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-header h2 {
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
      margin: 0; color: #fff;
    }
    .btn-close-cart {
      background: none; border: none; color: var(--muted);
      font-size: 1.5rem; cursor: pointer; transition: color 0.2s; line-height: 1;
    }
    .btn-close-cart:hover { color: var(--cream); }
    .cart-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-empty {
      text-align: center; padding: 3rem 1rem;
      color: var(--muted); font-size: 0.95rem;
    }
    .cart-empty div { font-size: 3rem; margin-bottom: 0.75rem; }

    /* Docena banner */
    #docena-banner {
      border-radius: 10px; padding: 0.875rem 1rem; margin-bottom: 1rem;
      font-size: 0.85rem; font-weight: 600; display: none;
    }
    #docena-banner.progreso {
      background: rgba(244,189,77,0.1); color: var(--gold);
      border: 1px solid rgba(244,189,77,0.25);
    }
    #docena-banner.lograda {
      background: rgba(74,222,128,0.1); color: #4ade80;
      border: 1px solid rgba(74,222,128,0.25);
    }

    /* Cart items */
    .cart-item {
      display: flex; align-items: flex-start; gap: 0.875rem;
      padding: 0.875rem 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-emoji { font-size: 1.5rem; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-info h4 {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700; color: #fff;
      margin: 0 0 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cart-item-info .item-price { font-size: 0.8rem; color: var(--muted); }
    .qty-ctrl {
      display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;
    }
    .btn-qty {
      background: var(--noir); border: 1px solid var(--border);
      color: var(--cream); width: 28px; height: 28px;
      border-radius: 6px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-qty:hover { background: var(--gold); border-color: var(--gold); color: var(--noir); }
    .qty-num {
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
      min-width: 24px; text-align: center; color: #fff;
    }
    .btn-remove {
      background: none; border: none; color: var(--muted);
      font-size: 1.1rem; cursor: pointer; transition: color 0.2s;
      padding: 0; line-height: 1;
    }
    .btn-remove:hover { color: #f87171; }

    /* Cart footer */
    .cart-footer {
      padding: 1rem; border-top: 1px solid var(--border);
    }
    .total-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .total-label { font-size: 0.85rem; color: var(--muted); }
    .total-amount {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800; color: var(--gold);
    }
    .total-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; }
    .cart-note {
      background: var(--noir); border: 1px solid var(--border);
      color: var(--cream); font-family: 'Manrope', sans-serif;
      font-size: 0.85rem; padding: 0.625rem 0.875rem; border-radius: 8px;
      width: 100%; resize: none; outline: none; margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .cart-note:focus { border-color: var(--gold); }
    .btn-wa-checkout {
      width: 100%; background: #25D366; color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
      border: none; padding: 1rem; border-radius: 10px; cursor: pointer;
      transition: background 0.2s; margin-bottom: 0.5rem;
    }
    .btn-wa-checkout:hover { background: #1fba59; }
    .btn-vaciar {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.8rem; padding: 0.5rem;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .btn-vaciar:hover { border-color: #f87171; color: #f87171; }

    /* FAB carrito mobile */
    #fab-cart {
      position: fixed; bottom: 2rem; right: 1.5rem; z-index: 150;
      background: var(--gold); color: var(--noir);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
      padding: 0.75rem 1.25rem; border-radius: 99px;
      box-shadow: 0 4px 20px rgba(244,189,77,0.4);
      cursor: pointer; border: none;
      display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s, background 0.2s;
    }
    #fab-cart.visible { opacity: 1; transform: translateY(0); }
    #fab-cart:hover { background: var(--gold-dark); }

    /* Back to top */
    #back-to-top {
      position: fixed; bottom: 2rem; left: 1.5rem; z-index: 150;
      background: var(--card); color: var(--cream); width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid var(--border); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s, background 0.2s;
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0); }
    #back-to-top:hover { background: var(--gold); color: var(--noir); }

    @media (max-width: 600px) {
      .pcard-grid { grid-template-columns: 1fr 1fr; }
      .pcard-emoji-wrap { font-size: 2.5rem; }
    }
    @media (max-width: 380px) {
      .pcard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="scroll-progress"></div>

<!-- Header -->
<header id="header">
  <div class="header-main">
    <a href="./index.html" class="btn-back" aria-label="Volver">←</a>
    <div class="header-brand">
      <img src="./img/logo.jpg" alt="El Sabor de Mamá" />
      <span>El Sabor de Mamá</span>
    </div>
    <button class="btn-cart" id="btn-cart" onclick="openCart()">
      🥟 Pedido
      <div class="cart-badge" id="cart-badge">0</div>
    </button>
  </div>
  <div class="pills-strip" id="pills-strip">
    <button class="pill active" data-cat="todos">Todos</button>
  </div>
  <div class="search-strip">
    <input class="search-input" id="search-input" type="text" placeholder="Buscar sabor…" />
    <button class="btn-clear" id="btn-clear-search" onclick="clearSearch()">✕</button>
  </div>
</header>

<div id="status-banner" class="abierto">Verificando horario…</div>

<div id="catalogo">
  <!-- Skeleton -->
  <div id="skeleton-loader" class="skeleton" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;padding:1.25rem 0">
    ${Array(6).fill(`<div class="sk-block" style="height:220px;border-radius:10px"></div>`).join('')}
  </div>
</div>

<!-- Cart overlay + drawer -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer">
  <div class="cart-header">
    <h2>Tu Pedido</h2>
    <button class="btn-close-cart" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cart-body">
    <div class="cart-empty"><div>🥟</div>Tu pedido está vacío.<br>¡Elegí tus sabores!</div>
  </div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="total-row">
      <span class="total-label">Total estimado</span>
      <span class="total-amount" id="total-amount">$0</span>
    </div>
    <p class="total-sub">* Precios orientativos. Confirmamos por WhatsApp.</p>
    <textarea class="cart-note" id="cart-note" rows="2" placeholder="Nota para el pedido (opcional)…"></textarea>
    <button class="btn-wa-checkout" onclick="sendWhatsApp()">💬 Enviar pedido por WhatsApp</button>
    <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>
  </div>
</div>

<!-- FAB -->
<button id="fab-cart" onclick="openCart()">🥟 <span id="fab-total">$0</span></button>
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const _FALLBACK = {
  "negocio": { "nombre": "El Sabor de Mamá", "whatsapp": "5492244475575", "direccion": "Av. Domingo Faustino Sarmiento 545, Las Flores" },
  "precios": { "empanada_unit": 1500, "docena": 16000, "docena_cantidad": 12 },
  "oferta": { "activa": false },
  "horarios": {
    "lunes":     [{"abre":"11:00","cierra":"14:00"},{"abre":"19:00","cierra":"23:00"}],
    "martes":    [{"abre":"11:00","cierra":"14:00"},{"abre":"19:00","cierra":"23:00"}],
    "miércoles": [{"abre":"11:00","cierra":"14:00"},{"abre":"19:00","cierra":"23:00"}],
    "jueves":    [{"abre":"11:00","cierra":"14:00"},{"abre":"19:00","cierra":"23:00"}],
    "viernes":   [{"abre":"11:00","cierra":"14:00"},{"abre":"19:00","cierra":"23:30"}],
    "sábado":    [{"abre":"11:00","cierra":"14:30"},{"abre":"19:00","cierra":"23:30"}],
    "domingo":   [{"abre":"19:00","cierra":"23:00"}]
  },
  "categorias": [
    { "id": "clasicas", "nombre": "Clásicas", "emoji": "🥟",
      "productos": [
        {"id":1,"nombre":"Carne","descripcion":"Carne suave con el relleno justo","precio":1500,"emoji":"🥩"},
        {"id":2,"nombre":"Jamón y Queso","descripcion":"La clásica combinación irresistible","precio":1500,"emoji":"🧀"},
        {"id":3,"nombre":"Humita","descripcion":"Choclo cremoso y aromático","precio":1500,"emoji":"🌽"},
        {"id":4,"nombre":"Capresse","descripcion":"Tomate, mozzarella y albahaca","precio":1500,"emoji":"🍅"}
      ]
    },
    { "id": "especiales", "nombre": "Especiales", "emoji": "⭐",
      "productos": [
        {"id":5,"nombre":"Calabressa","descripcion":"Chorizo calabrés con cebolla","precio":1500,"emoji":"🌶️"},
        {"id":6,"nombre":"Cheddburger","descripcion":"Carne, cheddar y cebolla caramelizada","precio":1500,"emoji":"🍔"},
        {"id":7,"nombre":"Fugazzeta","descripcion":"Cebolla, mozzarella y aceitunas","precio":1500,"emoji":"🧅"},
        {"id":8,"nombre":"Roquefort & Nuez","descripcion":"Queso azul con nueces tostadas","precio":1500,"emoji":"🫙"}
      ]
    }
  ]
};

// ── Pricing constants ──────────────────────────────────────────────
let PRECIO_UNIT = 1500;
let PRECIO_DOCENA = 16000;
let DOCENA_CANT = 12;
let negocioData = {};

// ── Cart state ─────────────────────────────────────────────────────
let cart = [];
const CART_KEY = 'cart_esm';

function loadCart() {
  try { cart = JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { cart = []; }
}
function saveCart() {
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

// ── Docena logic ───────────────────────────────────────────────────
function calcTotal(items) {
  const totalUnits = items.reduce((s, i) => s + i.qty, 0);
  const docenas = Math.floor(totalUnits / DOCENA_CANT);
  const sueltas = totalUnits % DOCENA_CANT;
  return docenas * PRECIO_DOCENA + sueltas * PRECIO_UNIT;
}

function docenaInfo(items) {
  const total = items.reduce((s, i) => s + i.qty, 0);
  const docenas = Math.floor(total / DOCENA_CANT);
  const sueltas = total % DOCENA_CANT;
  const ahorro = docenas * (DOCENA_CANT * PRECIO_UNIT - PRECIO_DOCENA);
  const faltanPara = sueltas === 0 ? 0 : DOCENA_CANT - sueltas;
  return { total, docenas, sueltas, ahorro, faltanPara };
}

// ── Cart UI ────────────────────────────────────────────────────────
function updateCartUI() {
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  const total = calcTotal(cart);
  const info = docenaInfo(cart);

  // Header badge
  const badge = document.getElementById('cart-badge');
  const btnCart = document.getElementById('btn-cart');
  badge.textContent = totalQty;
  badge.style.display = totalQty > 0 ? 'flex' : 'none';
  btnCart.classList.toggle('has-items', totalQty > 0);

  // FAB
  const fab = document.getElementById('fab-cart');
  const fabTotal = document.getElementById('fab-total');
  fab.classList.toggle('visible', totalQty > 0 && window.scrollY < document.body.scrollHeight - window.innerHeight - 100);
  fabTotal.textContent = `$${total.toLocaleString('es-AR')}`;

  // Cart footer
  const footer = document.getElementById('cart-footer');
  footer.style.display = totalQty > 0 ? '' : 'none';

  // Total
  document.getElementById('total-amount').textContent = `$${total.toLocaleString('es-AR')}`;

  // Docena banner
  const banner = document.getElementById('docena-banner');
  if (!banner) return;

  if (totalQty === 0) {
    banner.style.display = 'none';
  } else if (info.docenas > 0 && info.faltanPara === 0) {
    banner.className = 'lograda';
    banner.style.display = '';
    banner.innerHTML = `✅ ¡Tenés ${info.docenas} docena${info.docenas > 1 ? 's' : ''}! Ahorrás $${info.ahorro.toLocaleString('es-AR')} 🎉`;
  } else if (info.docenas > 0 && info.faltanPara > 0) {
    banner.className = 'progreso';
    banner.style.display = '';
    banner.innerHTML = `✅ ${info.docenas} docena${info.docenas > 1 ? 's' : ''} + ${info.sueltas} suelta${info.sueltas !== 1 ? 's' : ''}. Sumá ${info.faltanPara} más para otra docena 🥟`;
  } else {
    banner.className = 'progreso';
    banner.style.display = '';
    banner.innerHTML = `🥟 Llevás ${totalQty} empanada${totalQty !== 1 ? 's' : ''}. ¡Sumá ${info.faltanPara} más para la docena a $${PRECIO_DOCENA.toLocaleString('es-AR')}!`;
  }
}

function renderCartBody() {
  const body = document.getElementById('cart-body');
  if (cart.length === 0) {
    body.innerHTML = `<div class="cart-empty"><div>🥟</div>Tu pedido está vacío.<br>¡Elegí tus sabores!</div>`;
    return;
  }

  const info = docenaInfo(cart);
  body.innerHTML = `
    <div id="docena-banner"></div>
    ${cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-emoji">${item.emoji || '🥟'}</div>
        <div class="cart-item-info">
          <h4>${item.nombre}</h4>
          <div class="item-price">$${PRECIO_UNIT.toLocaleString('es-AR')} c/u</div>
          <div class="qty-ctrl">
            <button class="btn-qty" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="btn-qty" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>
        <button class="btn-remove" onclick="removeItem(${item.id})" title="Eliminar">✕</button>
      </div>
    `).join('')}
  `;
  updateCartUI();
}

function addToCart(product) {
  const existing = cart.find(i => i.id === product.id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: product.id, nombre: product.nombre, emoji: product.emoji, qty: 1 });
  }
  saveCart();
  renderCartBody();
  updateCartUI();

  // Visual feedback
  const btn = document.querySelector(`[data-pid="${product.id}"]`);
  if (btn) {
    btn.textContent = '✓';
    btn.style.background = '#4ade80';
    btn.style.color = '#000';
    setTimeout(() => { btn.textContent = '+ Agregar'; btn.style.background = ''; btn.style.color = ''; }, 600);
  }
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  saveCart();
  renderCartBody();
  updateCartUI();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  saveCart();
  renderCartBody();
  updateCartUI();
}

function vaciarCarrito() {
  if (!confirm('¿Vaciar el carrito?')) return;
  cart = [];
  saveCart();
  renderCartBody();
  updateCartUI();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  renderCartBody();
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function sendWhatsApp() {
  if (cart.length === 0) return;
  const info = docenaInfo(cart);
  const total = calcTotal(cart);
  const nota = document.getElementById('cart-note').value.trim();

  // Group by category
  let lines = [`Hola! Quiero hacer un pedido en El Sabor de Mamá.`, '', 'Quiero pedir:', ''];

  // Find category for each item
  const allProds = {};
  (_fallbackData.categorias || []).forEach(cat => {
    cat.productos.forEach(p => { allProds[p.id] = { ...p, catNombre: cat.nombre, catEmoji: cat.emoji }; });
  });

  const byCategory = {};
  cart.forEach(item => {
    const prod = allProds[item.id];
    const catKey = prod ? prod.catNombre : 'Otros';
    const catEmoji = prod ? prod.catEmoji : '🥟';
    if (!byCategory[catKey]) byCategory[catKey] = { emoji: catEmoji, items: [] };
    byCategory[catKey].items.push(item);
  });

  Object.entries(byCategory).forEach(([cat, { emoji, items }]) => {
    lines.push(`${emoji} ${cat}:`);
    items.forEach(i => lines.push(`  • ${i.qty}x ${i.nombre}`));
    lines.push('');
  });

  if (info.docenas > 0) {
    lines.push(`📦 Total: ${info.total} empanadas → ${info.docenas} docena${info.docenas > 1 ? 's' : ''} + ${info.sueltas} suelta${info.sueltas !== 1 ? 's' : ''}`);
    lines.push(`💰 Total estimado: $${total.toLocaleString('es-AR')} (precio docena aplicado ✅)`);
  } else {
    lines.push(`🥟 Total: ${info.total} empanada${info.total !== 1 ? 's' : ''}`);
    lines.push(`💰 Total estimado: $${total.toLocaleString('es-AR')}`);
  }

  if (nota) { lines.push(''); lines.push(`📝 Nota: ${nota}`); }

  const wa = negocioData.whatsapp || '5492244475575';
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
}

// ── Status banner ──────────────────────────────────────────────────
function buildStatus(data) {
  const dias = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
  const ahora = new Date();
  const minAhora = ahora.getHours() * 60 + ahora.getMinutes();
  const diaIdx = ahora.getDay() === 0 ? 6 : ahora.getDay() - 1;
  const hoy = dias[diaIdx];
  const turnos = data.horarios[hoy] || [];
  const abierto = turnos.some(t => {
    const [ah, am] = t.abre.split(':').map(Number);
    const [ch, cm] = t.cierra.split(':').map(Number);
    return minAhora >= ah * 60 + am && minAhora < ch * 60 + cm;
  });

  const banner = document.getElementById('status-banner');
  if (abierto) {
    const turnoActivo = turnos.find(t => {
      const [ah, am] = t.abre.split(':').map(Number);
      const [ch, cm] = t.cierra.split(':').map(Number);
      return minAhora >= ah * 60 + am && minAhora < ch * 60 + cm;
    });
    banner.className = 'abierto';
    banner.textContent = `● Abierto ahora — cierra a las ${turnoActivo?.cierra} hs`;
  } else {
    banner.className = 'cerrado';
    let prox = '';
    for (let i = 0; i < 7; i++) {
      const d = dias[(diaIdx + i) % 7];
      const ts = data.horarios[d] || [];
      for (const t of ts) {
        const [ah, am] = t.abre.split(':').map(Number);
        if (i === 0 && ah * 60 + am <= minAhora) continue;
        prox = i === 0 ? `Abre hoy a las ${t.abre} hs` : `Abre el ${d} a las ${t.abre} hs`;
        break;
      }
      if (prox) break;
    }
    banner.textContent = `● Cerrado — ${prox}`;
  }
}

// ── Catalog ─────────────────────────────────────────────────────────
let _fallbackData = _FALLBACK;

function buildCatalog(data) {
  _fallbackData = data;
  negocioData = data.negocio || {};
  PRECIO_UNIT = data.precios?.empanada_unit || 1500;
  PRECIO_DOCENA = data.precios?.docena || 16000;
  DOCENA_CANT = data.precios?.docena_cantidad || 12;

  // Pills
  const pills = document.getElementById('pills-strip');
  pills.innerHTML = `<button class="pill active" data-cat="todos">Todos</button>` +
    data.categorias.map(c => `<button class="pill" data-cat="${c.id}">${c.emoji} ${c.nombre}</button>`).join('');
  pills.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    pills.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.cat-section').forEach(s => {
      s.classList.toggle('hidden-cat', cat !== 'todos' && s.dataset.cat !== cat);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Catalog
  document.getElementById('skeleton-loader').remove();
  const cat = document.getElementById('catalogo');
  cat.innerHTML = data.categorias.map(c => `
    <div class="cat-section" data-cat="${c.id}">
      <div class="cat-title">${c.emoji} ${c.nombre}</div>
      <div class="pcard-grid">
        ${c.productos.map(p => `
          <div class="pcard" data-nombre="${p.nombre.toLowerCase()}">
            <div class="pcard-emoji-wrap">${p.emoji || '🥟'}</div>
            <div class="pcard-body">
              <h3>${p.nombre}</h3>
              <p>${p.descripcion}</p>
              <div class="pcard-footer">
                <span class="pcard-price">$${p.precio.toLocaleString('es-AR')}</span>
                <button class="btn-add" data-pid="${p.id}"
                  onclick='addToCart(${JSON.stringify(p)})'>+ Agregar</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  gsap.from('.cat-section', { y: 40, opacity: 0, stagger: 0.08, duration: 0.55, ease: 'power2.out' });
  buildStatus(data);
}

// ── Search ────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const btnClear = document.getElementById('btn-clear-search');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();
  btnClear.style.display = q ? '' : 'none';
  document.querySelectorAll('.pcard').forEach(card => {
    const nombre = card.dataset.nombre || '';
    card.classList.toggle('hidden', q && !nombre.includes(q));
  });
  document.querySelectorAll('.cat-section').forEach(sec => {
    const visible = sec.querySelectorAll('.pcard:not(.hidden)').length > 0;
    sec.classList.toggle('hidden-cat', !visible);
  });
});

function clearSearch() {
  searchInput.value = '';
  btnClear.style.display = 'none';
  document.querySelectorAll('.pcard').forEach(c => c.classList.remove('hidden'));
  document.querySelectorAll('.cat-section').forEach(s => s.classList.remove('hidden-cat'));
}

// ── Scroll events ─────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('scroll-progress').style.width = pct + '%';
  document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 300);
  const fab = document.getElementById('fab-cart');
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  fab.classList.toggle('visible', totalQty > 0);
});

// ── Boot ──────────────────────────────────────────────────────────
loadCart();
updateCartUI();

fetch('./productos.json')
  .then(r => r.json())
  .then(data => buildCatalog(data))
  .catch(() => buildCatalog(_FALLBACK));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
