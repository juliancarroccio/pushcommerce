<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — El Sabor de Mamá</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="./img/logo.jpg" type="image/jpeg" />
  <style>
    :root { --noir:#0C0C0C; --gold:#F4BD4D; --gold-dark:#C4952A; --muted:#7A7060; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: var(--noir); margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    img { max-height: 60px; border-radius: 4px; margin-bottom: 2.5rem; }
    .code {
      font-size: clamp(6rem, 20vw, 10rem); font-weight: 900;
      color: var(--gold); line-height: 1; margin: 0 0 1rem;
      font-family: 'Helvetica Neue', sans-serif; letter-spacing: -0.04em;
    }
    .msg { font-size: 1.2rem; font-weight: 600; color: rgba(240,234,216,0.75); margin: 0 0 0.5rem; }
    .sub { font-size: 0.9rem; color: var(--muted); margin: 0 0 3rem; max-width: 320px; }
    .divider {
      width: 60px; height: 2px; margin: 0 auto 2.5rem;
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border-radius: 1px;
    }
    .btn-home {
      display: inline-block; background: var(--gold); color: var(--noir);
      font-weight: 700; font-size: 1rem; padding: 0.875rem 2rem;
      border-radius: 8px; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-home:hover { background: var(--gold-dark); transform: translateY(-2px); }
  </style>
</head>
<body>
  <img src="./img/logo.jpg" alt="El Sabor de Mamá" />
  <p class="code">404</p>
  <p class="msg">Esta página no existe.</p>
  <p class="sub">El contenido que buscás no fue encontrado o fue movido.</p>
  <div class="divider"></div>
  <a href="./index.html" class="btn-home">← Volver al inicio</a>
</body>
</html>
