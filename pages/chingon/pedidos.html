<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cola de Pedidos — Chingón Burgers</title>
  <link rel="icon" href="./img/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --noir:   #1A0D03;
      --slate:  #231205;
      --card:   #2C1A07;
      --card2:  #3A2510;
      --brd:    rgba(247,206,70,0.12);
      --brd2:   rgba(247,206,70,0.06);
      --gold:   #F7CE46;
      --gold2:  #C9A020;
      --cream:  #FFF8E8;
      --muted:  rgba(255,248,232,0.38);
      --c-pend: #EF4444;
      --c-prep: #F59E0B;
      --c-done: #10B981;
    }
    html, body { height: 100%; background: var(--noir); color: var(--cream); font-family: 'Outfit', sans-serif; }

    /* ── AUTH SCREEN ── */
    #s-auth {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.25rem; padding: 2rem;
    }
    #s-auth img { height: 64px; width: auto; border-radius: 50%; }
    #s-auth h2 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--gold); font-weight: 400; }
    #s-auth p  { font-size: 0.85rem; color: var(--muted); text-align: center; max-width: 280px; }

    /* Auth form (PBKDF2 password) */
    #auth-form { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 300px; }
    .auth-inp {
      width: 100%; padding: 0.65rem 0.875rem; background: var(--card2);
      border: 1.5px solid var(--brd); border-radius: 8px; color: var(--cream);
      font-family: 'Outfit', sans-serif; font-size: 0.875rem; outline: none;
      transition: border-color 0.15s;
    }
    .auth-inp:focus { border-color: var(--gold); }
    .auth-inp::placeholder { color: var(--muted); }
    .btn-auth {
      background: var(--gold); color: var(--noir); font-family: 'Outfit', sans-serif;
      font-size: 0.85rem; font-weight: 700; padding: 0.7rem; border: none;
      border-radius: 8px; cursor: pointer; transition: background 0.15s;
    }
    .btn-auth:hover { background: var(--gold2); }
    #auth-err { font-size: 0.78rem; color: #f87171; text-align: center; min-height: 1em; }
    #s-auth a { display: inline-block; margin-top: 0.25rem; color: var(--muted); font-size: 0.78rem; text-decoration: none; transition: color 0.15s; }
    #s-auth a:hover { color: var(--gold); }

    /* ── APP ── */
    #s-app { display: none; flex-direction: column; height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--slate); border-bottom: 1px solid var(--brd2);
      padding: 0 1rem; height: 52px;
      display: flex; align-items: center; gap: 0.875rem;
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .hdr-logo { height: 28px; width: auto; border-radius: 50%; }
    .hdr-title { font-family: 'DM Serif Display', serif; font-size: 0.9rem; font-weight: 400; color: var(--cream); }
    .hdr-tabs { display: flex; gap: 0; margin-left: 1rem; }
    .hdr-tab {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.3rem 0.9rem; border: 1px solid var(--brd);
      background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Outfit', sans-serif;
    }
    .hdr-tab:first-child { border-radius: 6px 0 0 6px; }
    .hdr-tab:last-child  { border-radius: 0 6px 6px 0; }
    .hdr-tab:not(:first-child) { border-left: none; }
    .hdr-tab.active { background: var(--gold); color: var(--noir); border-color: var(--gold); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    #badge-pend {
      background: var(--c-pend); color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; min-width: 1.6rem; text-align: center; display: none;
    }
    #btn-add {
      font-family: 'Outfit', sans-serif; font-size: 0.72rem; letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(247,206,70,0.12); border: 1px solid rgba(247,206,70,0.35); color: var(--gold);
      padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    #btn-add:hover { background: var(--gold); color: var(--noir); }
    #btn-portal {
      font-size: 0.7rem; color: var(--muted); background: none; border: none; cursor: pointer;
      transition: color 0.15s; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'Outfit', sans-serif;
    }
    #btn-portal:hover { color: var(--cream); }

    /* ── KANBAN ── */
    #view-kanban {
      flex: 1; display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem; padding: 0.75rem; overflow: hidden;
    }
    @media (max-width: 720px) { #view-kanban { grid-template-columns: repeat(2, 1fr); overflow-y: auto; } }
    @media (max-width: 480px) { #view-kanban { grid-template-columns: 1fr; } }

    .col {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--brd2); border-radius: 10px; overflow: hidden; min-height: 0;
    }
    .col-hdr {
      padding: 0.6rem 0.875rem; display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid var(--brd2);
      font-family: 'Outfit', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col[data-s="pendiente"]  .dot { background: var(--c-pend); box-shadow: 0 0 5px var(--c-pend); }
    .col[data-s="preparando"] .dot { background: var(--c-prep); box-shadow: 0 0 5px var(--c-prep); }
    .col[data-s="listo"]      .dot { background: var(--c-done); box-shadow: 0 0 5px var(--c-done); }
    .col-count { margin-left: auto; color: var(--muted); font-size: 0.7rem; }

    .col-body { flex: 1; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; min-height: 0; }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }

    /* ── CARDS ── */
    .card {
      background: rgba(255,255,255,0.035); border: 1px solid var(--brd2);
      border-radius: 8px; padding: 0.75rem; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:none } }
    .card.flash { animation: flash 0.7s ease; }
    @keyframes flash { 0%,100%{border-color:var(--brd2)} 40%{border-color:var(--gold);box-shadow:0 0 10px rgba(247,206,70,0.25)} }

    .card-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.4rem; }
    .card-num  { font-family: 'Outfit', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
    .card-time { font-size: 0.65rem; color: var(--muted); }
    .card-cat  { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin: 0.4rem 0 0.1rem; }
    .card-item { font-size: 0.78rem; color: rgba(255,248,232,0.8); padding: 0.1rem 0; }
    .card-sep  { border: none; border-top: 1px solid var(--brd2); margin: 0.5rem 0; }
    .card-total { font-family: 'DM Serif Display', serif; font-size: 0.95rem; font-weight: 400; color: var(--gold); }
    .card-modalidad { font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; }
    .card-nota { font-size: 0.72rem; color: var(--muted); font-style: italic; margin-top: 0.4rem; padding: 0.35rem 0.5rem; background: rgba(0,0,0,0.15); border-radius: 5px; border-left: 2px solid rgba(247,206,70,0.3); }
    .card-cliente { font-size: 0.78rem; font-weight: 600; color: var(--cream); margin-top: 0.4rem; }
    .card-dir { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    .card-actions { display: flex; gap: 0.35rem; margin-top: 0.65rem; flex-wrap: wrap; }
    .btn-adv {
      flex: 1; font-family: 'Outfit', sans-serif; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.4rem 0.5rem; border-radius: 5px; border: none; cursor: pointer; font-weight: 700; transition: all 0.15s; white-space: nowrap;
    }
    .col[data-s="pendiente"]  .btn-adv { background: var(--c-prep); color: #1a0d03; }
    .col[data-s="preparando"] .btn-adv { background: var(--c-done); color: #fff; }
    .btn-adv:hover { filter: brightness(1.1); }
    .btn-icon {
      width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--brd2);
      background: none; color: var(--muted); cursor: pointer; font-size: 0.78rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--brd); }
    .btn-icon:disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
    .btn-del { color: #f87171; border-color: rgba(248,113,113,0.12); }
    .btn-del:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }

    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; opacity: 0.2; padding: 1.5rem; }
    .empty-icon { font-size: 1.6rem; }
    .empty-txt  { font-family: 'Outfit', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── HISTORIAL ── */
    #view-historial { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
    #hist-toolbar { position: sticky; top: 0; z-index: 10; padding: 0.4rem 0.875rem; background: var(--noir); border-bottom: 1px solid var(--brd2); display: flex; justify-content: flex-end; flex-shrink: 0; }
    #btn-export-csv {
      font-family: 'Outfit', sans-serif; font-size: 0.65rem; letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(247,206,70,0.1); border: 1px solid rgba(247,206,70,0.3); color: var(--gold);
      padding: 0.3rem 0.7rem; border-radius: 5px; cursor: pointer; transition: all 0.15s;
    }
    #btn-export-csv:hover { background: var(--gold); color: var(--noir); }
    #hist-content { padding: 1rem; }
    .hist-day { margin-bottom: 1.25rem; }
    .hist-day-hdr { font-family: 'Outfit', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--brd2); display: flex; align-items: center; justify-content: space-between; }
    .hist-day-body { display: flex; flex-direction: column; gap: 0.4rem; padding: 0.5rem 0; }
    .hist-row { background: rgba(255,255,255,0.025); border: 1px solid var(--brd2); border-radius: 7px; padding: 0.65rem 0.875rem; display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.8rem; }
    .hist-num   { font-family: 'Outfit', sans-serif; font-size: 0.65rem; color: var(--muted); width: 2rem; flex-shrink: 0; padding-top: 0.1rem; }
    .hist-items { flex: 1; color: rgba(255,248,232,0.65); line-height: 1.5; }
    .hist-total { font-family: 'DM Serif Display', serif; font-size: 0.9rem; color: var(--gold); white-space: nowrap; }
    .hist-estado { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.15rem 0.4rem; border-radius: 4px; white-space: nowrap; margin-top: 0.2rem; }
    .hist-estado.pendiente  { background: rgba(239,68,68,0.15);  color: #f87171; }
    .hist-estado.preparando { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .hist-estado.listo      { background: rgba(16,185,129,0.15); color: #34d399; }
    .hist-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; flex-shrink: 0; }

    /* ── MODAL AGREGAR ── */
    #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    #modal-bg.open { display: flex; }
    #modal { background: var(--card); border: 1px solid var(--brd); border-radius: 16px 16px 0 0; padding: 1.25rem; width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; gap: 0.875rem; animation: slideUp 0.25s ease; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between; }
    .modal-hdr h3 { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--cream); font-weight: 400; }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; transition: color 0.15s; }
    .btn-close:hover { color: var(--cream); }
    #modal-search { width: 100%; padding: 0.6rem 0.875rem; background: var(--card2); border: 1px solid var(--brd); border-radius: 7px; color: var(--cream); font-size: 0.875rem; outline: none; font-family: 'Outfit', sans-serif; }
    #modal-search:focus { border-color: var(--gold); }
    #modal-search::placeholder { color: var(--muted); }
    #modal-results { overflow-y: auto; max-height: 24vh; display: flex; flex-direction: column; gap: 0.25rem; }
    .prod-opt { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.75rem; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.025); border: 1px solid transparent; transition: all 0.12s; }
    .prod-opt:hover { background: var(--brd2); border-color: var(--brd); }
    .prod-opt-emoji { font-size: 1rem; width: 1.5rem; text-align: center; }
    .prod-opt-name  { flex: 1; font-size: 0.82rem; color: var(--cream); }
    .prod-opt-price { font-family: 'DM Serif Display', serif; font-size: 0.82rem; color: var(--gold); }
    #modal-cart { border-top: 1px solid var(--brd2); padding-top: 0.75rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .cart-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; }
    .cart-name { flex: 1; color: rgba(255,248,232,0.8); }
    .cart-qty  { display: flex; align-items: center; gap: 0.25rem; }
    .btn-qty   { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--brd); background: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .btn-qty:hover { background: var(--brd2); }
    .cart-qty-num { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--cream); min-width: 1rem; text-align: center; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.25rem; padding-top: 0.5rem; border-top: 1px solid var(--brd2); }
    .cart-total-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .cart-total-val { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--gold); }
    .modal-input { width: 100%; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--brd2); border-radius: 7px; color: var(--cream); font-size: 0.82rem; outline: none; font-family: 'Outfit', sans-serif; transition: border-color 0.15s; }
    .modal-input::placeholder { color: var(--muted); }
    .modal-input:focus { border-color: rgba(247,206,70,0.35); }
    .modal-input.error { border-color: #f87171; }
    .modal-lbl { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; display: block; }
    #modal-nota { width: 100%; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--brd2); border-radius: 7px; color: var(--cream); font-size: 0.8rem; outline: none; resize: none; font-family: 'Outfit', sans-serif; }
    #modal-nota::placeholder { color: var(--muted); }
    #btn-submit-order { font-family: 'Outfit', sans-serif; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; background: var(--gold); color: var(--noir); font-weight: 700; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; width: 100%; }
    #btn-submit-order:hover { background: var(--gold2); }
    #btn-submit-order:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Entrega toggle modal */
    .entrega-tog { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .btn-et { flex: 1; padding: 0.45rem; border-radius: 7px; border: 1.5px solid var(--brd); background: var(--card2); color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
    .btn-et.active { background: rgba(247,206,70,0.15); border-color: var(--gold); color: var(--gold); }

    /* ── MÉTRICAS ── */
    #view-metricas { flex: 1; overflow-y: auto; padding: 1rem; display: none; }
    .metr-grid { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
    .metr-card { background: rgba(255,255,255,0.025); border: 1px solid var(--brd2); border-radius: 10px; padding: 1rem 1.125rem; display: flex; flex-direction: column; gap: 0.625rem; }
    .metr-title { font-family: 'Outfit', sans-serif; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .metr-big { font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: var(--gold); font-weight: 400; line-height: 1; }
    .metr-sub { font-size: 0.75rem; color: var(--muted); }
    .metr-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .metr-badge { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .metr-empty { font-size: 0.78rem; color: var(--muted); font-style: italic; }
    .metr-bar-row { display: flex; align-items: center; gap: 0.625rem; }
    .metr-bar-label { font-size: 0.78rem; color: rgba(255,248,232,0.65); width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metr-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .metr-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
    .metr-bar-val { font-family: 'Outfit', sans-serif; font-size: 0.75rem; color: var(--muted); width: 2.5rem; text-align: right; flex-shrink: 0; }
    .metr-hourly { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
    .metr-h-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .metr-h-bar { width: 100%; background: var(--gold); border-radius: 2px 2px 0 0; min-height: 2px; opacity: 0.7; }
    .metr-h-lbl { font-size: 0.52rem; color: var(--muted); margin-top: 3px; white-space: nowrap; line-height: 1; }

    /* ── TOAST / CONN ── */
    #toast { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(150%); background: var(--gold); color: var(--noir); font-weight: 700; font-size: 0.82rem; padding: 0.6rem 1.25rem; border-radius: 8px; z-index: 999; transition: transform 0.25s ease; white-space: nowrap; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #conn-bar { background: #dc2626; color: #fff; font-size: 0.72rem; text-align: center; padding: 0.25rem; letter-spacing: 0.04em; display: none; }
    #conn-bar.on { display: block; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="s-auth" style="display:none">
  <img src="./img/logo.png" alt="Chingón Burgers">
  <h2>Acceso requerido</h2>
  <p>Ingresá tu contraseña o accedé desde el portal.</p>
  <div id="auth-form">
    <input type="password" id="auth-pwd" class="auth-inp" placeholder="Contraseña del portal" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuthLogin()">
    <button class="btn-auth" onclick="doAuthLogin()">Acceder</button>
    <p id="auth-err"></p>
  </div>
  <a href="./portal.html">Ir al portal →</a>
</div>

<!-- ── APP ── -->
<div id="s-app">
  <div id="conn-bar">Sin conexión — sincronizando cuando vuelva la red</div>
  <div id="toast"></div>

  <header>
    <img class="hdr-logo" src="./img/logo.png" alt="Chingón Burgers">
    <span class="hdr-title">Cola de Pedidos</span>
    <div class="hdr-tabs">
      <button class="hdr-tab active" onclick="switchView('kanban')">En curso</button>
      <button class="hdr-tab" onclick="switchView('historial')">Historial</button>
      <button class="hdr-tab" onclick="switchView('metricas')">Métricas</button>
    </div>
    <div class="hdr-right">
      <span id="badge-pend"></span>
      <button id="btn-add" onclick="openModal()">+ Agregar</button>
      <button id="btn-portal" onclick="window.location.href='./portal.html'">← Portal</button>

<script>
// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// ⚠️ Reemplazá con los valores del proyecto Firebase de Chingón
firebase.initializeApp({
  apiKey:            "PLACEHOLDER_API_KEY",
  authDomain:        "PLACEHOLDER.firebaseapp.com",
  projectId:         "PLACEHOLDER_PROJECT_ID",
  storageBucket:     "PLACEHOLDER.firebasestorage.app",
  messagingSenderId: "PLACEHOLDER_SENDER_ID",
  appId:             "PLACEHOLDER_APP_ID"
});
const db = firebase.firestore();

// ── CRYPTO (para auth por contraseña del portal) ──────────────────────────────
const _enc = new TextEncoder(), _dec = new TextDecoder();
const _frB64 = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
const SESSION_KEY = 'pc_cola_chingon';
const LS_PAT = 'pc_epat_chingon';

async function _deriveKey(pwd, salt) {
  const km = await crypto.subtle.importKey('raw', _enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
function setAuthErr(msg) { document.getElementById('auth-err').textContent = msg; }
async function doAuthLogin() {
  const pwd = document.getElementById('auth-pwd').value;
  if (!pwd) return;
  const stored = localStorage.getItem(LS_PAT);
  if (!stored) return setAuthErr('No hay token configurado. Configurá el acceso desde el portal.');
  try {
    const { s, i, d } = JSON.parse(stored);
    const key = await _deriveKey(pwd, _frB64(s));
    await crypto.subtle.decrypt({ name:'AES-GCM', iv: _frB64(i) }, key, _frB64(d));
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() }));
    document.getElementById('s-auth').style.display = 'none';
    document.getElementById('s-app').style.display = 'flex';
    bootApp();
  } catch { setAuthErr('Contraseña incorrecta.'); }
}

// ── AUTH CHECK ────────────────────────────────────────────────────────────────
(function() {
  const raw = sessionStorage.getItem(SESSION_KEY);
  let ok = false;
  if (raw) { try { const { ts } = JSON.parse(raw); ok = (Date.now() - ts) < 8 * 60 * 60 * 1000; } catch(_) {} }
  if (ok) {
    document.getElementById('s-app').style.display = 'flex';
    bootApp();
  } else {
    document.getElementById('s-auth').style.display = 'flex';
  }
})();

// ── ESTADO ────────────────────────────────────────────────────────────────────
let orders = {}, knownIds = new Set(), catalog = [], manualCart = [], dayCounter = 0;
let modalEntrega = 'retiro';
const ESTADOS  = ['pendiente','preparando','listo'];
const NEXT_LBL = { pendiente:'→ Preparar', preparando:'→ Listo / Enviado' };
const ENVIO_COSTO = 2500;

function fmt(n) { return '$' + n.toLocaleString('es-AR'); }

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let _ctx;
function beep() {
  try {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = _ctx.createOscillator(), g = _ctx.createGain();
    o.connect(g); g.connect(_ctx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.25, _ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _ctx.currentTime + 0.4);
    o.start(); o.stop(_ctx.currentTime + 0.4);
  } catch(_) {}
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  clearTimeout(_toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── VIEW ──────────────────────────────────────────────────────────────────────
function switchView(v) {
  document.getElementById('view-kanban').style.display    = v === 'kanban'    ? 'grid'  : 'none';
  document.getElementById('view-historial').style.display = v === 'historial' ? 'flex'  : 'none';
  document.getElementById('view-metricas').style.display  = v === 'metricas'  ? 'block' : 'none';
  document.querySelectorAll('.hdr-tab').forEach((el, i) =>
    el.classList.toggle('active', (v==='kanban'&&i===0)||(v==='historial'&&i===1)||(v==='metricas'&&i===2)));
  if (v === 'historial') renderHistorial();
  if (v === 'metricas')  renderMetricas();
}

// ── TIEMPO ────────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts.toMillis()) / 1000);
  if (s < 60)   return `hace ${s}s`;
  if (s < 3600) return `hace ${Math.floor(s/60)}min`;
  return ts.toDate().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(d) { return d.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' }); }
function startOfDay(d = new Date()) { const c = new Date(d); c.setHours(0,0,0,0); return c.getTime(); }

// ── RENDER CARD ───────────────────────────────────────────────────────────────
function mkCard(id, p, estado, posIdx = 0, posTotal = 1) {
  const groups = {};
  (p.items||[]).forEach(i => {
    const k = i.catLabel || i.cat || 'Productos';
    if (!groups[k]) groups[k] = [];
    groups[k].push(i);
  });
  const itemsHtml = Object.entries(groups).map(([cat, items]) => `
    <div class="card-cat">${cat}</div>
    ${items.map(i => `<div class="card-item">${i.qty}× ${i.nombre}</div>`).join('')}
  `).join('');

  const reorderBtns = estado === 'pendiente' ? `
    <button class="btn-icon" onclick="move('${id}',-1)" title="Subir" ${posIdx === 0 ? 'disabled' : ''}>↑</button>
    <button class="btn-icon" onclick="move('${id}', 1)" title="Bajar" ${posIdx === posTotal - 1 ? 'disabled' : ''}>↓</button>
  ` : '';
  const nextBtn = NEXT_LBL[estado] ? `<button class="btn-adv" onclick="advance('${id}')">${NEXT_LBL[estado]}</button>` : '';

  const el = document.createElement('div');
  el.className = 'card'; el.id = 'card-' + id;
  el.dataset.orden = p.orden || 0;

  const modalidadIcon = p.modalidad === 'envio' ? '🛵 Envío' : '🏪 Retiro';
  const envioLine = p.envio > 0 ? `<div class="card-modalidad">${modalidadIcon} · envío ${fmt(p.envio)}</div>` : `<div class="card-modalidad">${modalidadIcon}</div>`;

  el.innerHTML = `
    <div class="card-meta">
      <span class="card-num">#${p.numDia||'—'}</span>
      <span class="card-time">${timeAgo(p.creadoEn)}</span>
    </div>
    <div>${itemsHtml}</div>
    <hr class="card-sep">
    <div class="card-total">${fmt(p.total||0)}</div>
    ${envioLine}
    ${p.nombre    ? `<div class="card-cliente">👤 ${p.nombre}</div>` : ''}
    ${p.direccion ? `<div class="card-dir">📍 ${p.direccion}</div>` : ''}
    ${p.nota      ? `<div class="card-nota">📝 ${p.nota}</div>` : ''}
    <div class="card-actions">
      ${nextBtn}${reorderBtns}
      <button class="btn-icon btn-del" onclick="del('${id}')" title="Eliminar">🗑</button>
    </div>`;
  return el;
}

// ── RENDER KANBAN ─────────────────────────────────────────────────────────────
function render() {
  const today = startOfDay();
  const cols = { pendiente:[], preparando:[], listo:[] };

  Object.values(orders).forEach(p => {
    const ts = p.creadoEn ? p.creadoEn.toMillis() : 0;
    const s  = p.estado;
    if (!cols[s]) return;
    if (s === 'listo' && ts < today) return;
    cols[s].push(p);
  });
  cols.pendiente.sort((a,b)  => (a.orden||0)-(b.orden||0));
  cols.preparando.sort((a,b) => (a.orden||0)-(b.orden||0));
  cols.listo.sort((a,b)      => (b.orden||0)-(a.orden||0));

  const active = cols.pendiente.length + cols.preparando.length;
  const badge  = document.getElementById('badge-pend');
  badge.textContent = active;
  badge.style.display = active > 0 ? 'inline-block' : 'none';
  document.title = active > 0 ? `(${active}) Cola — Chingón Burgers` : 'Cola de Pedidos — Chingón Burgers';

  const icons = { pendiente:'📭', preparando:'👨‍🍳', listo:'✅' };
  const txts  = { pendiente:'Sin pedidos', preparando:'Vacío', listo:'Nada aún' };

  ESTADOS.forEach(s => {
    const body = document.getElementById('col-' + s);
    document.getElementById('cnt-' + s).textContent = cols[s].length;
    body.innerHTML = '';
    if (!cols[s].length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">${icons[s]}</div><div class="empty-txt">${txts[s]}</div></div>`;
      return;
    }
    cols[s].forEach((p, i, arr) => body.appendChild(mkCard(p.id, p, s, i, arr.length)));
  });
}

// ── RENDER HISTORIAL ──────────────────────────────────────────────────────────
function renderHistorial() {
  const days = {};
  Object.values(orders).forEach(p => {
    if (!p.creadoEn) return;
    const d = p.creadoEn.toDate(); d.setHours(0,0,0,0);
    const key = d.getTime();
    if (!days[key]) days[key] = { date: new Date(d), list: [] };
    days[key].list.push(p);
  });
  const sorted = Object.entries(days).sort(([a],[b]) => Number(b)-Number(a));
  const estLbl = { pendiente:'Pendiente', preparando:'En preparación', listo:'Listo/Enviado' };
  const hist   = document.getElementById('hist-content');
  if (!sorted.length) { hist.innerHTML = '<p style="text-align:center;opacity:.25;padding:3rem;font-family:Outfit,sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.8rem">Sin historial</p>'; return; }
  hist.innerHTML = sorted.map(([key, {date, list}]) => {
    const isToday = startOfDay() === Number(key);
    const total   = list.reduce((s,p) => s+(p.total||0), 0);
    const rows = list.sort((a,b)=>(a.numDia||0)-(b.numDia||0)).map(p => {
      const items_txt = (p.items||[]).map(i => `${i.qty}× ${i.nombre}`).join(', ');
      return `<div class="hist-row">
        <div class="hist-num">#${p.numDia||'—'}</div>
        <div class="hist-items">
          ${p.nombre ? `<div style="font-size:.75rem;font-weight:600;margin-bottom:.2rem">👤 ${p.nombre}${p.direccion?` · 📍 ${p.direccion}`:''}</div>` : ''}
          ${items_txt}${p.nota?`<div style="font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.2rem">📝 ${p.nota}</div>`:''}
        </div>
        <div class="hist-right">
          <div class="hist-total">${fmt(p.total||0)}</div>
          <div class="hist-estado ${p.estado}">${estLbl[p.estado]||p.estado}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="hist-day">
      <div class="hist-day-hdr">
        <span>${isToday?'Hoy':fmtDate(date)}</span>
        <span>${list.length} pedido${list.length!==1?'s':''} · ${fmt(total)}</span>
      </div>
      <div class="hist-day-body">${rows}</div>
    </div>`;
  }).join('');
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const estLbl = { pendiente:'Pendiente', preparando:'En preparación', listo:'Listo/Enviado' };
  const rows = [['Fecha','Hora','#Pedido','Nombre','Dirección','Modalidad','Productos','Subtotal','Envío','Total','Nota','Estado']];
  Object.values(orders).filter(p => p.creadoEn)
    .sort((a,b) => a.creadoEn.toMillis()-b.creadoEn.toMillis())
    .forEach(p => {
      const d = p.creadoEn.toDate();
      const items = (p.items||[]).map(i => `${i.qty}x ${i.nombre}`).join(' | ');
      rows.push([
        d.toLocaleDateString('es-AR'),
        d.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'}),
        p.numDia||'', p.nombre||'', p.direccion||'',
        p.modalidad==='envio'?'Envío':'Retiro',
        items, p.subtotal||'', p.envio||0, p.total||0, p.nota||'', estLbl[p.estado]||p.estado
      ]);
    });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' }));
  a.download = `chingon-pedidos-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('✅ CSV descargado');
}

// ── MÉTRICAS ──────────────────────────────────────────────────────────────────
function renderMetricas() {
  const today  = startOfDay();
  const all    = Object.values(orders).filter(p => p.creadoEn);
  const todayO = all.filter(p => p.creadoEn.toMillis() >= today);
  const todayT = todayO.reduce((s,p) => s+(p.total||0), 0);
  const todayC = { pendiente:0, preparando:0, listo:0 };
  todayO.forEach(p => { if (todayC[p.estado]!==undefined) todayC[p.estado]++; });

  const prodCounts = {};
  all.forEach(p => { (p.items||[]).forEach(i => {
    if (!prodCounts[i.nombre]) prodCounts[i.nombre] = { nombre:i.nombre, qty:0 };
    prodCounts[i.nombre].qty += i.qty||1;
  }); });
  const topProds = Object.values(prodCounts).sort((a,b) => b.qty-a.qty).slice(0,8);
  const maxQty   = topProds.length ? topProds[0].qty : 1;

  const byHour = Array(24).fill(0);
  all.forEach(p => { byHour[p.creadoEn.toDate().getHours()]++; });
  const maxH = Math.max(...byHour, 1);

  const envios  = all.filter(p => p.modalidad === 'envio').length;
  const retiros = all.filter(p => p.modalidad !== 'envio').length;

  const stateColor = { pendiente:'rgba(239,68,68,', preparando:'rgba(245,158,11,', listo:'rgba(16,185,129,' };
  const stateLbl   = { pendiente:'Pendiente', preparando:'Preparando', listo:'Listo' };

  document.getElementById('view-metricas').innerHTML = `
    <div class="metr-grid">
      <div class="metr-card">
        <div class="metr-title">Hoy · ${todayO.length} pedido${todayO.length!==1?'s':''}</div>
        <div class="metr-big">${fmt(todayT)}</div>
        <div class="metr-row">
          ${Object.entries(todayC).map(([k,v]) => `<div class="metr-badge" style="background:${stateColor[k]}0.15);color:${stateColor[k]}0.85)">${v} ${stateLbl[k]}</div>`).join('')}
        </div>
      </div>
      <div class="metr-card">
        <div class="metr-title">Modalidad de entrega</div>
        <div class="metr-row">
          <div class="metr-badge" style="background:rgba(247,206,70,0.15);color:var(--gold)">🏪 ${retiros} Retiro${retiros!==1?'s':''}</div>
          <div class="metr-badge" style="background:rgba(16,185,129,0.15);color:#34d399">🛵 ${envios} Envío${envios!==1?'s':''}</div>
        </div>
      </div>
      <div class="metr-card">
        <div class="metr-title">Productos más pedidos</div>
        ${!topProds.length ? '<div class="metr-empty">Sin datos aún</div>' :
          topProds.map(p => `<div class="metr-bar-row">
            <div class="metr-bar-label" title="${p.nombre}">${p.nombre}</div>
            <div class="metr-bar-track"><div class="metr-bar-fill" style="width:${(p.qty/maxQty*100).toFixed(1)}%"></div></div>
            <div class="metr-bar-val">${p.qty}×</div>
          </div>`).join('')}
      </div>
      <div class="metr-card">
        <div class="metr-title">Distribución horaria</div>
        <div class="metr-hourly">
          ${byHour.map((c,h) => `<div class="metr-h-col" title="${c} pedido${c!==1?'s':''} · ${String(h).padStart(2,'0')}:00hs">
            <div class="metr-h-bar" style="height:${Math.max(c>0?3:0,Math.round(c/maxH*56))}px"></div>
            <div class="metr-h-lbl">${h%4===0?h:''}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="metr-card">
        <div class="metr-title">Acumulado total</div>
        <div class="metr-big">${fmt(all.reduce((s,p)=>s+(p.total||0),0))}</div>
        <div class="metr-sub">${all.length} pedido${all.length!==1?'s':''} registrados</div>
      </div>
    </div>`;
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function advance(id) {
  const p = orders[id]; if (!p) return;
  const idx = ESTADOS.indexOf(p.estado), next = ESTADOS[idx+1];
  if (!next) return;
  db.collection('pedidos').doc(id).update({ estado: next, orden: Date.now() })
    .then(() => toast({ preparando:'👨‍🍳 En preparación', listo:'✅ Listo / Enviado' }[next]||'Actualizado'));
}

function del(id) {
  if (!confirm('¿Eliminar este pedido?')) return;
  db.collection('pedidos').doc(id).delete().then(() => toast('Pedido eliminado'));
}

function move(id, dir) {
  const p = orders[id]; if (!p || p.estado !== 'pendiente') return;
  const pend = Object.values(orders)
    .filter(o => o.estado === 'pendiente')
    .sort((a, b) => (a.orden || 0) - (b.orden || 0));
  const idx = pend.findIndex(o => o.id === id);
  const si  = idx + dir;
  if (si < 0 || si >= pend.length) return;
  const newOrdens = pend.map((_, i) => i);
  newOrdens[idx] = si;
  newOrdens[si]  = idx;
  const batch = db.batch();
  pend.forEach((o, i) => { batch.update(db.collection('pedidos').doc(o.id), { orden: newOrdens[i] }); });
  batch.commit();
}

// ── LISTENER ──────────────────────────────────────────────────────────────────
function bootApp() {
  db.collection('pedidos').orderBy('creadoEn','desc').limit(500)
    .onSnapshot(snap => {
      snap.docChanges().forEach(ch => {
        const id = ch.doc.id, data = { id, ...ch.doc.data() };
        if (ch.type === 'added') {
          if (!data.numDia) {
            const ts = data.creadoEn ? data.creadoEn.toMillis() : 0;
            if (ts >= startOfDay()) {
              dayCounter++;
              db.collection('pedidos').doc(id).update({ numDia: dayCounter }).catch(()=>{});
              data.numDia = dayCounter;
            }
          }
          if (!knownIds.has(id) && knownIds.size > 0) {
            beep(); toast('🛎 Nuevo pedido recibido!');
            document.title = '🛎 Nuevo pedido! — Cola';
            setTimeout(() => render(), 50);
          }
          knownIds.add(id);
        }
        if (ch.type === 'removed') { delete orders[id]; knownIds.delete(id); }
        else orders[id] = data;
      });
      render();
    }, () => document.getElementById('conn-bar').classList.add('on'));

  // Cargar catálogo para el modal
  fetch('./productos.json').then(r => r.json()).then(d => {
    d.categorias.forEach(cat => {
      (cat.productos||[]).forEach(p => {
        catalog.push({ emoji: cat.emoji||'🍔', nombre: p.nombre, precio: p.precio, catLabel: `${cat.emoji||''} ${cat.nombre}`, catId: cat.id, isBurger: !!cat.nota_sin_papas });
      });
    });
    filterProds('');
  }).catch(() => {
    [
      {nombre:'Chingona Simple',precio:8500,emoji:'🍔',cat:'Hamburguesas'},
      {nombre:'Chingona Doble',precio:12000,emoji:'🍔',cat:'Hamburguesas'},
      {nombre:'Chingona Triple',precio:15500,emoji:'🍔',cat:'Hamburguesas'},
      {nombre:'Papas fritas',precio:4000,emoji:'🍟',cat:'Adicionales'},
      {nombre:'Chicken Nuggets x6',precio:4500,emoji:'🍗',cat:'Adicionales'},
      {nombre:'Chicken Nuggets x12',precio:8000,emoji:'🍗',cat:'Adicionales'},
    ].forEach(p => catalog.push({ ...p, catLabel: p.cat, catId: p.cat.toLowerCase() }));
    filterProds('');
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function setModalEntrega(modo) {
  modalEntrega = modo;
  document.getElementById('met-retiro').classList.toggle('active', modo === 'retiro');
  document.getElementById('met-envio').classList.toggle('active', modo === 'envio');
  document.getElementById('modal-direccion').style.display = modo === 'envio' ? '' : 'none';
  renderManualCart();
}

function filterProds(q) {
  const res = document.getElementById('modal-results');
  const filtered = q.trim() ? catalog.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase())) : catalog;
  if (!filtered.length) { res.innerHTML = '<div style="font-size:.78rem;opacity:.25;padding:.5rem .75rem">Sin resultados</div>'; return; }
  res.innerHTML = '';
  filtered.slice(0, 12).forEach(p => {
    const d = document.createElement('div');
    d.className = 'prod-opt';
    d.innerHTML = `<span class="prod-opt-emoji">${p.emoji}</span><span class="prod-opt-name">${p.nombre}</span><span class="prod-opt-price">${fmt(p.precio)}</span>`;
    d.onclick = () => addToManualCart(p);
    res.appendChild(d);
  });
}

function addToManualCart(p) {
  const ex = manualCart.find(i => i.nombre === p.nombre);
  if (ex) ex.qty++; else manualCart.push({ ...p, qty:1 });
  renderManualCart();
}

function renderManualCart() {
  const cartEl = document.getElementById('modal-cart');
  const items  = document.getElementById('cart-items-modal');
  const totalEl = document.getElementById('modal-total');
  const btn    = document.getElementById('btn-submit-order');
  if (!manualCart.length) { cartEl.style.display='none'; btn.disabled=true; return; }
  cartEl.style.display = 'flex'; btn.disabled = false;

  items.innerHTML = manualCart.map((i,idx) => `
    <div class="cart-row">
      <span class="cart-name">${i.nombre}</span>
      <div class="cart-qty">
        <button class="btn-qty" onclick="qtyChange(${idx},-1)">−</button>
        <span class="cart-qty-num">${i.qty}</span>
        <button class="btn-qty" onclick="qtyChange(${idx}, 1)">+</button>
      </div>
      <span style="font-family:'DM Serif Display',serif;font-size:.8rem;color:var(--gold);min-width:4.5rem;text-align:right">${fmt(i.precio*i.qty)}</span>
    </div>`).join('');

  const sub = manualCart.reduce((s,i) => s + i.precio * i.qty, 0);
  const total = sub + (modalEntrega === 'envio' ? ENVIO_COSTO : 0);
  totalEl.textContent = fmt(total);
}

function qtyChange(idx, d) {
  manualCart[idx].qty += d;
  if (manualCart[idx].qty <= 0) manualCart.splice(idx, 1);
  renderManualCart();
}

async function submitManualOrder() {
  if (!manualCart.length) return;
  const nombreEl    = document.getElementById('modal-nombre');
  const direccionEl = document.getElementById('modal-direccion');
  const nombre      = nombreEl.value.trim();
  const direccion   = modalEntrega === 'envio' ? direccionEl.value.trim() : '';
  nombreEl.classList.toggle('error', !nombre);
  if (!nombre) { nombreEl.focus(); return; }
  const nota  = document.getElementById('modal-nota').value.trim();
  const sub   = manualCart.reduce((s,i) => s + i.precio * i.qty, 0);
  const envio = modalEntrega === 'envio' ? ENVIO_COSTO : 0;
  const total = sub + envio;
  document.getElementById('btn-submit-order').disabled = true;
  try {
    await db.collection('pedidos').add({
      creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
      orden: Date.now(), estado: 'pendiente', total, subtotal: sub, envio,
      nota, nombre, direccion, modalidad: modalEntrega, manual: true,
      items: manualCart.map(i => ({ nombre:i.nombre, catLabel:i.catLabel, cat:i.catId, qty:i.qty, precio:i.precio, emoji:i.emoji }))
    });
    toast('✅ Pedido agregado a la cola');
    closeModal();
  } catch(e) {
    toast('Error al guardar: ' + e.message);
    document.getElementById('btn-submit-order').disabled = false;
  }
}

function openModal() {
  manualCart = []; modalEntrega = 'retiro';
  document.getElementById('modal-nota').value = '';
  document.getElementById('modal-nombre').value = '';
  document.getElementById('modal-direccion').value = '';
  document.getElementById('modal-nombre').classList.remove('error');
  document.getElementById('modal-direccion').style.display = 'none';
  document.getElementById('met-retiro').classList.add('active');
  document.getElementById('met-envio').classList.remove('active');
  document.getElementById('modal-search').value = '';
  filterProds('');
  renderManualCart();
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function handleBgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

setInterval(render, 30000);
</script>
</body>
