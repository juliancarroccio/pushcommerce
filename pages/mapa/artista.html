<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artista — MAPA Espacio de Arte</title>
<meta name="description" content="MAPA Espacio de Arte — Las Flores, Buenos Aires.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #000; --white: #fff; --gray-100: #f4f4f4; --gray-200: #e0e0e0; --gray-400: #9e9e9e; --gray-600: #555; --font-display: 'Reem Kufi', sans-serif; --font-body: 'Inter', sans-serif; }
  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--black); font-family: var(--font-body); font-weight: 300; line-height: 1.7; }

  #scroll-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0; background: var(--black); z-index: 9999; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 800; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; background: var(--white); border-bottom: 1px solid var(--gray-200); }
  .nav-back { font-family: var(--font-display); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); text-decoration: none; }
  .nav-back:hover { color: var(--black); }
  .nav-logo { font-family: var(--font-display); font-weight: 700; font-size: 1.25rem; letter-spacing: 0.15em; text-decoration: none; color: var(--black); }
  .cart-btn { background: var(--black); color: var(--white); border: none; cursor: pointer; padding: 0.5rem 1rem; font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; }
  .cart-count { background: white; color: black; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: none; align-items: center; justify-content: center; font-weight: 600; }
  .cart-count.has-items { display: flex; }

  /* HERO */
  .artista-hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 70vh; }
  .artista-portrait { overflow: hidden; background: var(--gray-100); }
  .artista-portrait img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); display: block; }
  .artista-intro { padding: 4rem; display: flex; flex-direction: column; justify-content: center; }
  .artista-label { font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 1rem; }
  .artista-name { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.05; margin-bottom: 2rem; }
  .artista-bio { font-size: 0.9rem; color: var(--gray-600); line-height: 1.85; max-height: 280px; overflow: hidden; position: relative; }
  .artista-bio.expanded { max-height: none; }
  .bio-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, var(--white)); }
  .bio-toggle { margin-top: 1rem; background: none; border: none; cursor: pointer; font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); border-bottom: 1px solid var(--black); padding-bottom: 2px; }
  @media (max-width: 768px) {
    .artista-hero { grid-template-columns: 1fr; }
    .artista-portrait { min-height: 50vw; max-height: 60vw; }
    .artista-portrait img { height: 100%; }
    .artista-intro { padding: 2rem; }
  }

  /* OBRAS */
  .obras-section { padding: 4rem 3rem; }
  .obras-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200); }
  .obras-title { font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .obras-count { font-size: 0.8rem; color: var(--gray-400); }
  .obras-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
  @media (max-width: 900px) { .obras-grid { grid-template-columns: repeat(2, 1fr); } .obras-section { padding: 3rem 1.5rem; } }
  @media (max-width: 480px) { .obras-grid { grid-template-columns: 1fr; } }

  /* OBRA CARD */
  .obra-card { cursor: pointer; }
  .obra-img-wrap { aspect-ratio: 1; overflow: hidden; background: var(--gray-100); margin-bottom: 1rem; position: relative; }
  .obra-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.4s, transform 0.5s; }
  .obra-card:hover .obra-img { filter: grayscale(0%); transform: scale(1.03); }
  .obra-badge-consultar { position: absolute; bottom: 0.75rem; left: 0.75rem; background: rgba(0,0,0,0.7); color: var(--white); font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.6rem; }
  .obra-badge-reservada { position: absolute; top: 0.75rem; right: 0.75rem; background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.7); font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.6rem; }
  .obra-titulo { font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
  .obra-meta { font-size: 0.78rem; color: var(--gray-400); line-height: 1.5; margin-bottom: 0.75rem; }
  .obra-precio { font-size: 0.85rem; margin-bottom: 0.75rem; }
  .obra-precio-consultar { color: var(--gray-400); font-style: italic; }
  .obra-precio-valor { color: var(--black); font-weight: 500; }
  .btn-agregar { width: 100%; background: var(--black); color: var(--white); border: none; padding: 0.75rem; font-family: var(--font-display); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-agregar:hover { background: #333; }
  .btn-agregar:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .btn-agregar.added { background: #555; }

  /* DETAIL BOTTOM SHEET */
  #detail-sheet { position: fixed; inset: 0; z-index: 850; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; visibility: hidden; }
  #detail-sheet.open { pointer-events: auto; visibility: visible; }
  #detail-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.4s; }
  #detail-sheet.open #detail-backdrop { opacity: 1; }
  #detail-panel { position: relative; z-index: 1; background: var(--white); border-radius: 12px 12px 0 0; max-height: 90vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(.32,.72,0,1); }
  #detail-sheet.open #detail-panel { transform: translateY(0); }
  .detail-handle { display: flex; justify-content: center; padding: 0.75rem 0 0.5rem; flex-shrink: 0; }
  .detail-handle-bar { width: 40px; height: 4px; background: var(--gray-200); border-radius: 2px; }
  #detail-content { overflow-y: auto; flex: 1; padding: 1rem 1.5rem 1.5rem; }
  #detail-img-wrap { background: var(--gray-100); overflow: hidden; margin-bottom: 1.5rem; border-radius: 4px; min-height: 120px; }
  #detail-img { width: 100%; height: auto; max-height: 55vh; object-fit: contain; filter: grayscale(30%); display: block; }
  #detail-artista { font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 0.5rem; }
  #detail-titulo { font-family: var(--font-display); font-size: 1.5rem; line-height: 1.2; margin-bottom: 1rem; }
  #detail-meta { font-size: 0.85rem; color: var(--gray-400); line-height: 1.6; margin-bottom: 1.25rem; }
  #detail-precio-wrap { margin-bottom: 1.25rem; }
  #detail-precio { font-size: 1.1rem; font-weight: 500; }
  #detail-precio-consultar { font-size: 0.9rem; color: var(--gray-400); font-style: italic; }
  .detail-footer { padding: 1rem 1.5rem 1.5rem; border-top: 1px solid var(--gray-200); display: flex; gap: 1rem; flex-shrink: 0; }
  .btn-detail-back { flex: 1; background: none; border: 1px solid var(--gray-200); color: var(--black); padding: 0.8rem; font-family: var(--font-display); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn-detail-add { flex: 2; background: var(--black); color: var(--white); border: none; padding: 0.8rem; font-family: var(--font-display); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn-detail-add:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

  /* CART DRAWER */
  #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 900; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #cart-overlay.open { opacity: 1; pointer-events: auto; }
  #cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 100vw); z-index: 901; background: var(--white); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.4s cubic-bezier(.32,.72,0,1); }
  #cart-drawer.open { transform: translateX(0); }
  .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
  .cart-header h2 { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .cart-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--gray-400); }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
  .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--gray-400); font-size: 0.875rem; }
  .cart-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--gray-200); }
  .cart-item-img { width: 64px; height: 64px; object-fit: cover; flex-shrink: 0; filter: grayscale(100%); }
  .cart-item-body { flex: 1; }
  .cart-item-artista { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); }
  .cart-item-titulo { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; }
  .cart-item-price { font-size: 0.85rem; color: var(--gray-600); margin-top: 0.25rem; }
  .cart-item-remove { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 0.75rem; margin-top: 0.5rem; }
  .cart-footer { padding: 1.5rem; border-top: 1px solid var(--gray-200); }
  .cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; font-family: var(--font-display); }
  .cart-total-label { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); }
  .cart-disclaimer { font-size: 0.72rem; color: var(--gray-400); margin-bottom: 1.5rem; line-height: 1.5; }
  .cart-note { width: 100%; border: 1px solid var(--gray-200); padding: 0.75rem; font-family: var(--font-body); font-size: 0.85rem; resize: none; margin-bottom: 1rem; color: var(--black); }
  .cart-note:focus { outline: none; border-color: var(--black); }
  .btn-wa { width: 100%; background: var(--black); color: var(--white); border: none; padding: 1rem; font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn-clear { width: 100%; background: none; border: 1px solid var(--gray-200); color: var(--gray-400); padding: 0.6rem; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; }
  .btn-clear:hover { border-color: var(--black); color: var(--black); }
  #cart-fab { position: fixed; bottom: 2rem; right: 2rem; z-index: 800; background: var(--black); color: var(--white); border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  #cart-fab.visible { display: flex; }
  #cart-fab-count { position: absolute; top: 4px; right: 4px; background: #fff; color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  footer { padding: 2rem 3rem; border-top: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--gray-400); flex-wrap: wrap; gap: 1rem; }
  footer a { color: inherit; text-decoration: none; }
  footer a:hover { color: var(--black); }
  .nav-logo { display: flex; align-items: center; }
  .nav-logo-img { height: 40px; display: block; }
</style>
</head>
<body>

<div id="scroll-progress"></div>

<nav>
  <a class="nav-back" href="./artistas.html">← Artistas</a>
  <a class="nav-logo" href="./index.html"><img class="nav-logo-img" src="./img/site/logo-transparent.png" alt="MAPA"></a>
  <button class="cart-btn" onclick="openCart()">
    <span>Pedido</span>
    <span class="cart-count" id="cart-count-nav">0</span>
  </button>
</nav>

<div id="artista-hero" class="artista-hero" style="min-height:60vh;background:var(--gray-100);">
  <!-- Hero placeholder while loading -->
</div>

<div id="obras-section" class="obras-section" style="display:none">
  <div class="obras-header">
    <p class="obras-title">Obras</p>
    <p class="obras-count" id="obras-count"></p>
  </div>
  <div class="obras-grid" id="obras-grid"></div>
</div>

<footer>
  <span>© MAPA Espacio de Arte, Las Flores</span>
  <a href="https://github.com/juliancarroccio" target="_blank">PushCommerce</a>
</footer>

<!-- DETAIL SHEET -->
<div id="detail-sheet" role="dialog">
  <div id="detail-backdrop" onclick="closeDetail()"></div>
  <div id="detail-panel">
    <div class="detail-handle"><div class="detail-handle-bar"></div></div>
    <div id="detail-content">
      <div id="detail-img-wrap"><img id="detail-img" src="" alt="" loading="lazy"></div>
      <p id="detail-artista"></p>
      <h2 id="detail-titulo"></h2>
      <p id="detail-meta"></p>
      <div id="detail-precio-wrap">
        <p id="detail-precio" class="hidden"></p>
        <p id="detail-precio-consultar" class="hidden">Consultar precio</p>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn-detail-back" onclick="closeDetail()">Volver</button>
      <button class="btn-detail-add" id="detail-add-btn">+ Agregar</button>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer" role="dialog">
  <div class="cart-header">
    <h2>Tu pedido</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">Estimado</span>
      <span id="cart-total">$0</span>
    </div>
    <p class="cart-disclaimer">Los precios son orientativos. "Consultar precio" significa que el valor se acuerda directamente con MAPA. Las obras marcadas como "Reservada" no están disponibles.</p>
    <textarea class="cart-note" id="cart-note" rows="2" placeholder="Nota adicional..."></textarea>
    <button class="btn-wa" onclick="sendWhatsApp()">Consultar por WhatsApp</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar pedido</button>
  </div>
</div>

<button id="cart-fab" onclick="openCart()">🛒<span id="cart-fab-count">0</span></button>

<script>
gsap.registerPlugin && gsap.registerPlugin();

const WHATSAPP = '5491112345678';
const CART_KEY = 'mapa_cart';
let _artist = null;
let _cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
let _currentObra = null;

// Scroll progress
const bar = document.getElementById('scroll-progress');
window.addEventListener('scroll', () => {
  bar.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%';
});

// Load data
const slug = new URLSearchParams(location.search).get('slug');
if (!slug) { location.href = './artistas.html'; }

fetch('./artistas.json')
  .then(r => r.json())
  .then(data => {
    _artist = data.artistas.find(a => a.slug === slug);
    if (!_artist) { location.href = './artistas.html'; return; }
    document.title = `${_artist.nombre} — MAPA Espacio de Arte`;
    buildHero(_artist);
    buildObras(_artist);
    updateCartUI();
  })
  .catch(() => { location.href = './artistas.html'; });

function buildHero(a) {
  const hero = document.getElementById('artista-hero');
  hero.innerHTML = `
    <div class="artista-portrait">
      <img src="${a.retrato}" alt="${a.nombre}" loading="eager">
    </div>
    <div class="artista-intro">
      <p class="artista-label">Artista</p>
      <h1 class="artista-name">${a.nombre}</h1>
      <div class="artista-bio" id="artista-bio">
        <p>${a.bio || 'Artista visual integrante de MAPA Espacio de Arte.'}</p>
        ${a.bio && a.bio.length > 300 ? '<div class="bio-fade" id="bio-fade"></div>' : ''}
      </div>
      ${a.bio && a.bio.length > 300 ? '<button class="bio-toggle" id="bio-toggle" onclick="toggleBio()">Leer más</button>' : ''}
    </div>
  `;
  gsap.from('.artista-portrait img', { opacity: 0, scale: 1.05, duration: 1 });
  gsap.from('.artista-intro > *', { opacity: 0, y: 20, duration: 0.8, stagger: 0.15, delay: 0.2 });
}

function toggleBio() {
  const bio = document.getElementById('artista-bio');
  const fade = document.getElementById('bio-fade');
  const btn = document.getElementById('bio-toggle');
  bio.classList.toggle('expanded');
  if (bio.classList.contains('expanded')) {
    if (fade) fade.style.display = 'none';
    btn.textContent = 'Leer menos';
  } else {
    if (fade) fade.style.display = '';
    btn.textContent = 'Leer más';
  }
}

function buildObras(a) {
  const section = document.getElementById('obras-section');
  const grid = document.getElementById('obras-grid');
  const count = document.getElementById('obras-count');

  section.style.display = '';
  count.textContent = `${a.obras.length} obra${a.obras.length !== 1 ? 's' : ''}`;

  grid.innerHTML = a.obras.map((obra, i) => {
    const inCart = _cart.some(c => c.key === cartKey(a, obra));
    return `
      <div class="obra-card" onclick="openDetail(${i})">
        <div class="obra-img-wrap">
          <img class="obra-img" src="${obra.imagen}" alt="${obra.titulo}" loading="lazy" onerror="this.parentElement.style.background='#eee'">
          ${!obra.precio_visible ? '<span class="obra-badge-consultar">Consultar</span>' : ''}
          ${!obra.disponible ? '<span class="obra-badge-reservada">Reservada</span>' : ''}
        </div>
        <p class="obra-titulo">${obra.titulo}</p>
        <p class="obra-meta">${[obra.tecnica, obra.dimensiones].filter(Boolean).join(' · ')}</p>
        <p class="obra-precio">${obra.precio_visible ? '<span class="obra-precio-valor">$' + obra.precio.toLocaleString('es-AR') + '</span>' : '<span class="obra-precio-consultar">Consultar precio</span>'}</p>
        <button class="btn-agregar${inCart ? ' added' : ''}" onclick="event.stopPropagation(); toggleCart(${i})" id="btn-${i}" ${!obra.disponible ? 'disabled' : ''}>
          ${!obra.disponible ? 'Reservada' : inCart ? '− Quitar' : '+ Consultar / Agregar'}
        </button>
      </div>
    `;
  }).join('');

  gsap.from('.obra-card', { opacity: 0, y: 30, duration: 0.6, stagger: 0.08, scrollTrigger: { trigger: grid, start: 'top 85%' } });
}

function cartKey(artist, obra) {
  return `${artist.slug}-${obra.titulo}`;
}

function openDetail(idx) {
  _currentObra = { idx, obra: _artist.obras[idx] };
  const obra = _artist.obras[idx];

  document.getElementById('detail-img').src = obra.imagen;
  document.getElementById('detail-img').alt = obra.titulo;
  document.getElementById('detail-artista').textContent = _artist.nombre.toUpperCase();
  document.getElementById('detail-titulo').textContent = obra.titulo;

  const metaParts = [obra.tecnica, obra.dimensiones].filter(Boolean);
  document.getElementById('detail-meta').textContent = metaParts.join(' · ') || '';

  const precioEl = document.getElementById('detail-precio');
  const consultarEl = document.getElementById('detail-precio-consultar');
  if (obra.precio_visible) {
    precioEl.textContent = '$' + obra.precio.toLocaleString('es-AR');
    precioEl.style.display = '';
    consultarEl.style.display = 'none';
  } else {
    precioEl.style.display = 'none';
    consultarEl.style.display = '';
  }

  const addBtn = document.getElementById('detail-add-btn');
  const inCart = _cart.some(c => c.key === cartKey(_artist, obra));
  if (!obra.disponible) {
    addBtn.textContent = 'Reservada';
    addBtn.disabled = true;
  } else if (inCart) {
    addBtn.textContent = '− Quitar';
    addBtn.disabled = false;
    addBtn.onclick = () => { removeFromCart(cartKey(_artist, obra)); closeDetail(); };
  } else {
    addBtn.textContent = '+ Agregar';
    addBtn.disabled = false;
    addBtn.onclick = () => { addObraToCart(idx); closeDetail(); };
  }

  document.getElementById('detail-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-sheet').classList.remove('open');
  document.body.style.overflow = '';
  _currentObra = null;
}

function addObraToCart(idx) {
  const obra = _artist.obras[idx];
  const key = cartKey(_artist, obra);
  if (!_cart.find(c => c.key === key)) {
    _cart.push({
      key, slug: _artist.slug, nombre: _artist.nombre,
      titulo: obra.titulo, imagen: obra.imagen,
      precio: obra.precio, precio_visible: obra.precio_visible
    });
    saveCart();
    updateCartUI();
    refreshObraBtn(idx);
  }
}

function toggleCart(idx) {
  const obra = _artist.obras[idx];
  const key = cartKey(_artist, obra);
  if (_cart.find(c => c.key === key)) {
    removeFromCart(key);
  } else {
    addObraToCart(idx);
  }
}

function removeFromCart(key) {
  _cart = _cart.filter(c => c.key !== key);
  saveCart();
  updateCartUI();
  refreshAllBtns();
  renderCartItems();
}

function refreshAllBtns() {
  if (!_artist) return;
  _artist.obras.forEach((_, i) => refreshObraBtn(i));
}

function refreshObraBtn(idx) {
  const btn = document.getElementById(`btn-${idx}`);
  if (!btn) return;
  const obra = _artist.obras[idx];
  const inCart = _cart.some(c => c.key === cartKey(_artist, obra));
  btn.textContent = inCart ? '− Quitar' : '+ Consultar / Agregar';
  btn.classList.toggle('added', inCart);
}

function clearCart() {
  _cart = [];
  saveCart();
  updateCartUI();
  refreshAllBtns();
  renderCartItems();
}

function saveCart() { localStorage.setItem(CART_KEY, JSON.stringify(_cart)); }

function updateCartUI() {
  const n = _cart.length;
  document.getElementById('cart-count-nav').textContent = n;
  document.getElementById('cart-count-nav').classList.toggle('has-items', n > 0);
  document.getElementById('cart-fab-count').textContent = n;
  document.getElementById('cart-fab').classList.toggle('visible', n > 0);
}

function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  renderCartItems();
}

function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
}

function renderCartItems() {
  const el = document.getElementById('cart-items');
  if (_cart.length === 0) {
    el.innerHTML = '<p class="cart-empty">No hay obras en tu pedido.</p>';
    document.getElementById('cart-total').textContent = '$0';
    return;
  }
  el.innerHTML = _cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.imagen}" alt="${item.titulo}" onerror="this.style.background='#eee'">
      <div class="cart-item-body">
        <p class="cart-item-artista">${item.nombre}</p>
        <p class="cart-item-titulo">${item.titulo}</p>
        <p class="cart-item-price">${item.precio_visible ? '$' + item.precio.toLocaleString('es-AR') : 'Consultar precio'}</p>
        <button class="cart-item-remove" onclick="removeFromCart('${item.key.replace(/'/g, "\\'")}')">✕ Quitar</button>
      </div>
    </div>
  `).join('');
  const total = _cart.filter(i => i.precio_visible).reduce((s, i) => s + i.precio, 0);
  document.getElementById('cart-total').textContent = total > 0 ? '$' + total.toLocaleString('es-AR') : 'A consultar';
}

function sendWhatsApp() {
  if (_cart.length === 0) return;
  const note = document.getElementById('cart-note').value.trim();
  let lines = ['Hola! Me contacto desde el sitio de MAPA Espacio de Arte.', '', 'Me interesa consultar sobre las siguientes obras:', ''];
  _cart.forEach(item => {
    const precio = item.precio_visible ? ` ($${item.precio.toLocaleString('es-AR')})` : ' (consultar precio)';
    lines.push(`• "${item.titulo}" — ${item.nombre}${precio}`);
  });
  if (note) lines.push('', `Nota: ${note}`);
  lines.push('', 'Quedo a la espera de más información. ¡Muchas gracias!');
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
</body>
</html>
