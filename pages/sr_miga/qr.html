<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR — Sr. Miga</title>
  <link rel="icon" href="./img/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #fff; }
    .card { max-width: 400px; margin: 0 auto; }
    #qr-box canvas, #qr-box img { display: block; margin: 0 auto; }
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .card { box-shadow: none !important; border: none !important; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8" style="background: #fdf2f8;">

  <div class="card bg-white rounded-3xl shadow-xl p-10 text-center">

    <!-- Logo -->
    <img src="./img/logo.png" alt="Sr. Miga" class="mx-auto mb-1" style="width: min(180px, 70%); height: auto; filter: brightness(0);">

    <p class="text-xs font-medium tracking-widest uppercase mb-6" style="color: #B83A7A;">Sandwichería · Las Flores</p>

    <div class="w-12 h-px mx-auto mb-6" style="background: #B83A7A;"></div>

    <!-- QR -->
    <div id="qr-box" class="mb-6 flex items-center justify-center"></div>

    <div class="w-12 h-px mx-auto mb-6" style="background: #B83A7A;"></div>

    <p class="font-semibold text-sm mb-1" style="color: #1A1A1A;">Escaneá para ver nuestro menú</p>
    <p class="text-xs mb-6" style="color: #888; word-break: break-all;">juliancarroccio.github.io/pushcommerce/<br>pages/sr_miga/tienda.html</p>

    <p class="text-xs" style="color: #aaa;">Av. San Martín 858 · Las Flores, Buenos Aires</p>

    <div class="mt-8 pt-6 border-t" style="border-color: #f0e0ea;">
      <p class="text-xs" style="color: #ccc;">Powered by <span style="color: #B83A7A;">PushCommerce</span></p>
    </div>

  </div>

  <button onclick="window.print()" class="no-print fixed bottom-6 right-6 text-white text-sm font-semibold py-3 px-6 rounded-full shadow-lg" style="background: #B83A7A;">
    Imprimir
  </button>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qr-box'), {
      text: 'https://juliancarroccio.github.io/pushcommerce/pages/sr_miga/tienda.html',
      width: 220,
      height: 220,
      colorDark: '#1A1A1A',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
