<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Cincomentario</title>
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#C8822E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Cormorant+Garamond:ital@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1008;
      color: #F2E8D5;
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.038;
      animation: grain-shift 0.35s steps(1) infinite;
    }
    @keyframes grain-shift {
      0%  { transform: translate(0,0) }
      25% { transform: translate(-2%,-3%) }
      50% { transform: translate(3%,2%) }
      75% { transform: translate(-1%,3%) }
    }

    .bg-num {
      position: fixed;
      font-size: clamp(160px, 30vw, 280px);
      font-weight: 700;
      line-height: 1;
      color: rgba(201,168,124,0.055);
      letter-spacing: 0.05em;
      user-select: none;
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; opacity: 0.75;
      border: 1px solid rgba(201,168,124,0.2);
      margin: 0 auto 36px;
      display: block;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #C8822E;
      margin-bottom: 14px;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      line-height: 1.5;
      color: rgba(242,232,213,0.4);
      margin-bottom: 44px;
    }

    .divider {
      width: 3rem; height: 1px;
      background: rgba(201,168,124,0.2);
      margin: 0 auto 44px;
    }

    a.btn {
      display: inline-block;
      background: #C8822E;
      color: #1A1008;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 40px;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    a.btn:hover { background: #E09840; transform: scale(1.03); }

    .brand {
      margin-top: 52px;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(242,232,213,0.12);
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <p class="bg-num" aria-hidden="true">404</p>

  <div class="content">
    <img src="./494509243_18122239129446348_7279241484691807032_n.jpg"
         alt="Cincomentario" class="logo">
    <h1>Página no encontrada</h1>
    <p class="subtitle">
      Lo que buscás no está aquí.<br>
      Pero los quesos sí.
    </p>
    <div class="divider"></div>
    <a href="./index.html" class="btn">← Volver al inicio</a>
    <p class="brand">Cincomentario · Las Flores, Buenos Aires</p>
  </div>
</body>
</html>
