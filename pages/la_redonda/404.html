<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — La Redonda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #FAF7F2; color: #1A1A1A; font-family: 'Outfit', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 2rem;
  }
  .num {
    font-family: 'DM Serif Display', Georgia, serif; font-style: italic;
    font-size: clamp(6rem, 20vw, 12rem); line-height: 1; color: #B31C22;
    margin-bottom: 0.25rem;
  }
  .brand { margin-bottom: 1rem; }
  .brand img { height: 80px; width: 80px; object-fit: contain; border-radius: 50%; }
  .msg { color: #888; font-size: 0.95rem; margin-bottom: 2rem; }
  .btn {
    background: #B31C22; color: #fff; padding: 0.8rem 2rem; border-radius: 8px;
    text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: background 0.2s;
  }
  .btn:hover { background: #8B1519; }
</style>
</head>
<body>
  <p class="num">404</p>
  <p class="brand"><img src="./img/logo.jpg" alt="La Redonda"></p>
  <p class="msg">Esta página no existe, pero nuestras pizzas sí.</p>
  <a href="./index.html" class="btn">Volver al inicio</a>
</body>
</html>
