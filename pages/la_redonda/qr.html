<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR — La Redonda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { width: 360px; text-align: center; padding: 2.5rem 2rem; border: 1px solid #E2D9CC; border-radius: 4px; }
  .logo-wrap { margin-bottom: 1.5rem; }
  .logo-img { height: 90px; width: 90px; object-fit: contain; border-radius: 50%; display: block; margin: 0 auto; }
  .brand-name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-top: 0.5rem; color: #1A1A1A; }
  .tagline { font-size: 0.72rem; color: #888; letter-spacing: 0.07em; margin-top: 0.3rem; }
  .divider { width: 40px; height: 2px; background: #B31C22; margin: 1.25rem auto; }
  #qr-box { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  #qr-box img, #qr-box canvas { border: 8px solid #fff; outline: 1px solid #E2D9CC; }
  .scan-text { font-size: 0.72rem; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; font-weight: 600; }
  .url { font-size: 0.65rem; color: #aaa; word-break: break-all; margin-bottom: 1.25rem; }
  .divider2 { width: 100%; height: 1px; background: #E2D9CC; margin-bottom: 1.25rem; }
  .direccion { font-size: 0.78rem; color: #555; margin-bottom: 0.3rem; }
  .powered { font-size: 0.65rem; color: #ccc; margin-top: 1.25rem; }
  @media print {
    body { background: white; padding: 0; }
    .card { border: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img" src="./img/logo.jpg" alt="La Redonda">
    <p class="brand-name">La Redonda</p>
    <p class="tagline">Pizzería artesanal · Las Flores, Buenos Aires</p>
  </div>
  <div class="divider"></div>
  <div id="qr-box"></div>
  <p class="scan-text">Escaneá para ver nuestros productos</p>
  <p class="url">juliancarroccio.github.io/pushcommerce/pages/la_redonda/tienda.html</p>
  <div class="divider2"></div>
  <p class="direccion">Av. Avellaneda 715, Las Flores</p>
  <p class="direccion">☎ 02244 47-4117</p>
  <p class="powered">Sitio web por PushCommerce</p>
</div>
<script>
new QRCode(document.getElementById('qr-box'), {
  text: 'https://juliancarroccio.github.io/pushcommerce/pages/la_redonda/tienda.html',
  width: 220,
  height: 220,
  colorDark: '#B31C22',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
