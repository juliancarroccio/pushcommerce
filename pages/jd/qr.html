<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>QR — JD Muebles de Melamina</title>
  <link rel="icon" href="./img/logo-JD.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --cream: #FAF7F2; --paper: #FFFFFF;
      --sand: #D5BFA3; --sand-deep: #B99972; --sand-soft: #EFE5D6;
      --ink: #2B2825; --line: #EAE2D6;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--cream); color: var(--ink);
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; font-weight: 300;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--line); border-radius: 28px;
      padding: 48px 40px; text-align: center;
      max-width: 400px; width: 100%;
      box-shadow: 0 30px 60px rgba(43,40,37,0.08);
    }
    .card img.logo { width: 65%; height: auto; margin: 0 auto 8px; display: block; }
    .tagline {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--sand-deep); font-weight: 500; margin-bottom: 26px;
    }
    #qr-box {
      display: inline-block; padding: 18px;
      background: #FFF; border: 1px solid var(--line); border-radius: 20px;
    }
    #qr-box img, #qr-box canvas { display: block; }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 26px 0 18px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .divider span { color: var(--sand-deep); font-size: 0.9rem; }
    h2 { font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 600; margin: 0 0 6px; }
    .url { font-size: 0.7rem; color: #9A917F; word-break: break-all; margin-bottom: 14px; }
    .dir { font-size: 0.8rem; color: #5E5648; line-height: 1.6; }
    .powered { margin-top: 22px; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #B0A896; }
    @media print {
      body { background: white; }
      .card { border: none; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="./img/logo-JD.png" alt="JD — Jonathan Dantas, Fábrica de Muebles de Melamina" />
    <div class="tagline">Fábrica de muebles de melamina</div>
    <div id="qr-box"></div>
    <div class="divider"><span>◆</span></div>
    <h2>Escaneá para ver nuestros muebles</h2>
    <div class="url">juliancarroccio.github.io/pushcommerce/pages/jd/tienda.html</div>
    <div class="dir">Av. Independencia 698, Las Flores<br />02244 47-5753</div>
    <div class="powered">Powered by PushCommerce</div>
  </div>
  <script>
    const url = 'https://juliancarroccio.github.io/pushcommerce/pages/jd/tienda.html';
    new QRCode(document.getElementById('qr-box'), {
      text: url, width: 220, height: 220,
      colorDark: '#2B2825', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
