<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda — Biga · Panadería Artesanal</title>
  <meta name="description" content="Catálogo online de Biga, panadería y pastelería artesanal en Las Flores. Pedí por WhatsApp.">
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#C4956A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,700;6..96,900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#F2EDE5',
            espresso: '#3A3429',
            'esp-mid':'#4A4338',
            sage:     '#6E7A6C',
            'sage-lt':'#9BA89A',
            wheat:    '#C4956A',
            'wheat-lt':'#D9AC80',
            stone:    '#8B857E',
            parchment:'#FAF7F2',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            bodoni:  ['"Bodoni Moda"', 'Georgia', 'serif'],
            serif:   ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans:    ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #F2EDE5; color: #3A3429; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    #scroll-progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: linear-gradient(90deg, #C4956A, #D9AC80);
      z-index: 99999; transition: width 0.1s linear;
    }

    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.018;
      animation: grain-shift 0.4s steps(1) infinite;
    }
    @keyframes grain-shift {
      0%  { transform: translate(0,0) }
      25% { transform: translate(-2%,-3%) }
      50% { transform: translate(3%,2%) }
      75% { transform: translate(-1%,3%) }
    }

    /* Sticky header */
    header { position: sticky; top: 0; z-index: 40; background: rgba(242,237,229,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(196,149,106,0.12); }

    /* Pills */
    .pill {
      flex-shrink: 0; padding: 6px 16px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid rgba(196,149,106,0.25); color: #8B857E; cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s; white-space: nowrap;
    }
    .pill.active { background: #C4956A; border-color: #C4956A; color: #FAF7F2; }
    .pill:not(.active):hover { border-color: rgba(196,149,106,0.5); color: #C4956A; }

    /* Product cards */
    .pcard {
      background: #FAF7F2; border: 1px solid rgba(196,149,106,0.15);
      display: flex; flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .pcard:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,52,41,0.09); }

    .pcard-img {
      aspect-ratio: 1; background: #F2EDE5;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pcard-img img { width: 100%; height: 100%; object-fit: cover; }
    .pcard-img .emoji-fallback { font-size: 2.5rem; }

    /* Qty stepper */
    .qty-btn {
      width: 28px; height: 28px; border: 1px solid rgba(196,149,106,0.3);
      background: transparent; color: #3A3429; font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .qty-btn:hover { background: rgba(196,149,106,0.1); border-color: #C4956A; }
    .qty-display {
      width: 32px; text-align: center; font-family: 'Playfair Display', serif;
      font-size: 15px; color: #3A3429; line-height: 28px;
    }

    /* Cart panel */
    #cart-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(420px, 100vw);
      background: #FAF7F2; border-left: 1px solid rgba(196,149,106,0.15);
      z-index: 50; transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      display: flex; flex-direction: column;
    }
    #cart-panel.open { transform: translateX(0); }
    #cart-overlay {
      position: fixed; inset: 0; background: rgba(58,52,41,0.35);
      z-index: 49; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease; backdrop-filter: blur(2px);
    }
    #cart-overlay.open { opacity: 1; pointer-events: auto; }

    .cart-item-row { border-bottom: 1px solid rgba(196,149,106,0.1); }
    .cart-item-row:last-child { border-bottom: none; }

    /* Skeleton */
    .skel { background: linear-gradient(90deg, #e8e3db 25%, #d8d3cb 50%, #e8e3db 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Search clear */
    #search-clear { display: none; }
    #search-clear.show { display: flex; }

    /* Back to top */
    #back-to-top {
      position: fixed; bottom: 24px; left: 24px; z-index: 30;
      width: 42px; height: 42px; border-radius: 50%;
      background: #C4956A; color: #FAF7F2; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #back-to-top.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <!-- Row 1: brand + cart -->
    <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between gap-4">

        Carrito

      </button>

        <input type="search" id="search-input" placeholder="Buscar productos…" oninput="filterBySearch(this.value)" autocomplete="off"

  <!-- CATALOG -->
  <main class="max-w-6xl mx-auto px-5 py-8 pb-32">

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let catalog = [];      // { id, nombre, unidad, precio, imagen, catId }
    let cart = [];         // { id, qty }
    let waNumber = '';
    let waSaludo = '';
    let activeFilter = 'todos';

    // ── Cart persistence ────────────────────────────────────────────────────────
    function loadCart() {
      try { cart = JSON.parse(localStorage.getItem('biga_cart') || '[]'); } catch { cart = []; }
    }
    function saveCart() {
      localStorage.setItem('biga_cart', JSON.stringify(cart));
    }

    // ── Format ──────────────────────────────────────────────────────────────────
    function formatPrecio(n) { return '$' + n.toLocaleString('es-AR'); }

    // ── Cart helpers ────────────────────────────────────────────────────────────
    function getQty(id) { return (cart.find(i => i.id === id) || {}).qty || 0; }

    function setQty(id, qty) {
      const idx = cart.findIndex(i => i.id === id);
      if (qty <= 0) { if (idx >= 0) cart.splice(idx, 1); }
      else if (idx >= 0) { cart[idx].qty = qty; }
      else { cart.push({ id, qty }); }
      saveCart();
      updateQtyDisplay(id);
      updateCartBadge();
      if (document.getElementById('cart-panel').classList.contains('open')) renderCartItems();
    }

    function updateQtyDisplay(id) {
      const qty = getQty(id);
      document.querySelectorAll(`[data-qty="${id}"]`).forEach(el => el.textContent = qty);
      document.querySelectorAll(`[data-card="${id}"]`).forEach(card => {
        card.classList.toggle('ring-1', qty > 0);
        card.classList.toggle('ring-wheat', qty > 0);
      });
    }

    function updateCartBadge() {
      const total = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('cart-badge');
      badge.textContent = total;
      badge.classList.toggle('hidden', total === 0);
    }

    // ── Cart panel ──────────────────────────────────────────────────────────────
    function openCart() {
      renderCartItems();
      document.getElementById('cart-panel').classList.add('open');
      document.getElementById('cart-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeCart() {
      document.getElementById('cart-panel').classList.remove('open');
      document.getElementById('cart-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items');
      if (!cart.length) {
        container.innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-3 text-stone/40"><p class="font-serif italic text-lg">Tu carrito está vacío</p><p class="font-sans text-xs">Agregá productos del catálogo</p></div>`;
        document.getElementById('cart-total').textContent = '$0';
        return;
      }
      let total = 0;
      container.innerHTML = cart.map(item => {
        const prod = catalog.find(p => p.id === item.id);
        if (!prod) return '';
        total += prod.precio * item.qty;
        return `<div class="cart-item-row flex items-center gap-3 py-3">
          <div class="w-12 h-12 bg-cream flex items-center justify-center overflow-hidden flex-shrink-0">
            <img src="${prod.imagen}" alt="${prod.nombre}" class="w-full h-full object-cover"
                 onerror="this.parentElement.innerHTML='<span class=\\'text-xl\\'>🥐</span>'">
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-display text-sm text-espresso leading-snug truncate">${prod.nombre}</p>
            <p class="font-sans text-xs text-stone">${prod.unidad} · ${formatPrecio(prod.precio)}</p>
          </div>
          <div class="flex items-center gap-0 flex-shrink-0">
            <button class="qty-btn" onclick="setQty(${prod.id}, ${item.qty - 1})">−</button>
            <span class="qty-display" data-qty="${prod.id}">${item.qty}</span>
            <button class="qty-btn" onclick="setQty(${prod.id}, ${item.qty + 1})">+</button>
          </div>
        </div>`;
      }).join('');
      document.getElementById('cart-total').textContent = formatPrecio(total);
    }

    // ── WhatsApp checkout ────────────────────────────────────────────────────────
    function sendToWhatsApp() {
      if (!cart.length) { openCart(); return; }
      const lines = [waSaludo, ''];
      cart.forEach(item => {
        const prod = catalog.find(p => p.id === item.id);
        if (prod) lines.push(`• ${prod.nombre} x${item.qty} (${prod.unidad}) — ${formatPrecio(prod.precio * item.qty)}`);
      });
      const total = cart.reduce((s, i) => { const p = catalog.find(x => x.id === i.id); return s + (p ? p.precio * i.qty : 0); }, 0);
      lines.push('', `*Total: ${formatPrecio(total)}*`);
      const note = document.getElementById('cart-note').value.trim();
      if (note) { lines.push('', `📝 *Nota:* ${note}`); }
      window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
    }

    // ── Filtering ────────────────────────────────────────────────────────────────
    function filterCat(id) {
      activeFilter = id;
      document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.cat === id));
      applyFilters();
    }

    function filterBySearch(q) {
      const clear = document.getElementById('search-clear');
      clear.classList.toggle('show', q.length > 0);
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      document.querySelectorAll('.cat-section').forEach(section => {
        const catId = section.dataset.cat;
        const matchesCat = activeFilter === 'todos' || catId === activeFilter;
        let visibleCount = 0;
        section.querySelectorAll('.pcard').forEach(card => {
          const name = card.querySelector('h3').textContent.toLowerCase();
          const matchesSearch = !q || name.includes(q);
          const show = matchesCat && matchesSearch;
          card.style.display = show ? '' : 'none';
          if (show) visibleCount++;
        });
        section.style.display = (matchesCat && visibleCount > 0) ? '' : 'none';
      });
    }

    // ── Skeleton ────────────────────────────────────────────────────────────────
    function generateSkeleton() {
      const section = (n) => `<div class="mb-10"><div class="skel h-5 w-32 mb-6 rounded-sm"></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${Array(n).fill(`<div class="pcard"><div class="aspect-square skel"></div><div class="p-3"><div class="skel h-3 w-3/4 mb-2 rounded-sm"></div><div class="skel h-3 w-1/2 rounded-sm"></div></div></div>`).join('')}</div></div>`;
      return section(4) + section(4) + section(4) + section(3) + section(4);
    }

    // ── Open/Closed ─────────────────────────────────────────────────────────────
    function isAbierto(horarios) {
      const dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
      const now = new Date();
      const turnos = horarios[dias[now.getDay()]] || [];
      const hhmm = now.getHours() * 60 + now.getMinutes();
      return turnos.some(t => {
        const [ah, am] = t.abre.split(':').map(Number);
        const [ch, cm] = t.cierra.split(':').map(Number);
        return hhmm >= ah * 60 + am && hhmm < ch * 60 + cm;
      });
    }

    function getNextOpening(horarios) {
      const dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
      const labels = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      const now = new Date();
      const hhmm = now.getHours() * 60 + now.getMinutes();
      for (let offset = 0; offset < 8; offset++) {
        const d = new Date(now); d.setDate(d.getDate() + offset);
        const turnos = horarios[dias[d.getDay()]] || [];
        for (const t of turnos) {
          const [ah, am] = t.abre.split(':').map(Number);
          if (offset > 0 || ah * 60 + am > hhmm) {
            if (offset === 0) return `hoy a las ${t.abre}`;
            if (offset === 1) return `mañana a las ${t.abre}`;
            return `${labels[d.getDay()]} a las ${t.abre}`;
          }
        }
      }
      return null;
    }

    function renderStatusBanner(horarios) {
      const banner = document.getElementById('status-banner');
      const abierto = isAbierto(horarios);
      if (abierto) {
        banner.className = 'text-center py-2 px-4 text-xs font-sans border-b bg-sage/10 border-sage/15 text-sage';
        banner.textContent = '✓ Abierto ahora';
      } else {
        const prox = getNextOpening(horarios);
        banner.className = 'text-center py-2 px-4 text-xs font-sans border-b bg-stone/8 border-stone/10 text-stone';
        banner.textContent = `Cerrado${prox ? ` · Abre ${prox}` : ''}`;
      }
      banner.classList.remove('hidden');
    }

    // ── GA4 ─────────────────────────────────────────────────────────────────────
    function initGA4(id) {
      const s = document.createElement('script');
      s.src = `https://www.googletagmanager.com/gtag/js?id=${id}`;
      s.async = true; document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){ window.dataLayer.push(arguments); };
      window.gtag('js', new Date()); window.gtag('config', id);
    }

    // ── Render catalog ───────────────────────────────────────────────────────────
    function renderCategoryPills(categorias) {
      const pills = document.getElementById('cat-pills');
      const total = categorias.reduce((s, c) => s + c.productos.length, 0);
      pills.innerHTML = `<div class="pill active" data-cat="todos" onclick="filterCat('todos')">Todos (${total})</div>`;
      categorias.forEach(cat => {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.dataset.cat = cat.id;
        pill.textContent = `${cat.emoji} ${cat.label} (${cat.productos.length})`;
        pill.onclick = () => filterCat(cat.id);
        pills.appendChild(pill);
      });
    }

    function loadCatalog(data) {
      catalog = data.categorias.flatMap(cat =>
        cat.productos.map(p => ({ ...p, catId: cat.id }))
      );
      const root = document.getElementById('catalog-root');
      root.innerHTML = '';

      renderCategoryPills(data.categorias);

      data.categorias.forEach(cat => {
        const cols = cat.cols === 3 ? 'grid-cols-2 md:grid-cols-3' : 'grid-cols-2 md:grid-cols-4';
        const section = document.createElement('div');
        section.className = 'cat-section mb-12';
        section.dataset.cat = cat.id;
        section.innerHTML = `
          <h2 class="font-display text-xl text-espresso mb-6 flex items-center gap-2">
            <span>${cat.emoji}</span>
            <span>${cat.label}</span>
          </h2>
          <div class="grid ${cols} gap-4 cat-grid"></div>`;
        const grid = section.querySelector('.cat-grid');

        cat.productos.forEach(prod => {
          const qty = getQty(prod.id);
          const card = document.createElement('div');
          card.className = `pcard ${qty > 0 ? 'ring-1 ring-wheat' : ''}`;
          card.dataset.card = prod.id;
          card.innerHTML = `
            <div class="pcard-img">
              <img src="${prod.imagen}" alt="${prod.nombre}" loading="lazy"
                   onerror="this.parentElement.innerHTML='<span class=\\'emoji-fallback\\'>${cat.emoji}</span>'">
            </div>
            <div class="p-3 flex flex-col gap-1.5 flex-1">
              <h3 class="font-display text-sm text-espresso leading-snug">${prod.nombre}</h3>
              <p class="font-sans text-xs text-stone">${prod.unidad}</p>
              <p class="font-display text-base text-wheat font-bold mt-auto">${formatPrecio(prod.precio)}</p>
              <div class="flex items-center justify-between mt-1">
                <div class="flex items-center">
                  <button class="qty-btn" onclick="setQty(${prod.id}, ${qty - 1})">−</button>
                  <span class="qty-display" data-qty="${prod.id}">${qty}</span>
                  <button class="qty-btn" onclick="setQty(${prod.id}, ${qty + 1})">+</button>
                </div>
                <button onclick="setQty(${prod.id}, getQty(${prod.id}) + 1)"
                  class="font-sans text-[10px] tracking-widest uppercase text-wheat border border-wheat/30 px-2.5 py-1 hover:bg-wheat hover:text-parchment transition-colors">
                  Agregar
                </button>
              </div>
            </div>`;
          grid.appendChild(card);
        });

        root.appendChild(section);
      });

      updateCartBadge();
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    document.getElementById('catalog-root').innerHTML = generateSkeleton();
    loadCart();

    fetch('./productos.json', { cache: 'no-cache' })
      .then(r => r.json())
      .then(data => {
        const negocio = data.negocio;
        waNumber = negocio.whatsapp;
        waSaludo = negocio.saludo;

        const waBase = `https://wa.me/${waNumber}?text=${encodeURIComponent(waSaludo)}`;
        document.getElementById('footer-wa').href = waBase;

        loadCatalog(data);
        renderStatusBanner(data.horarios);

        // Nav estado
        const abierto = isAbierto(data.horarios);
        const navEstado = document.getElementById('nav-estado');
        navEstado.textContent = abierto ? 'Abierto' : 'Cerrado';
        navEstado.className = `font-sans text-[10px] tracking-widest uppercase px-2.5 py-1 rounded-sm ${abierto ? 'bg-sage/15 text-sage' : 'bg-stone/15 text-stone'}`;
        navEstado.classList.remove('hidden');

        // Oferta
        const oferta = data.oferta;
        if (oferta && oferta.activa) {
          const prod = catalog.find(p => p.id === oferta.producto_id);
          if (prod) {
            document.getElementById('oferta-titulo').textContent = oferta.titulo;
            document.getElementById('oferta-precio-original').textContent = formatPrecio(prod.precio);
            document.getElementById('oferta-precio').textContent = formatPrecio(oferta.precio_oferta);
            document.getElementById('oferta-vigencia').textContent = oferta.vigencia;
            document.getElementById('oferta-banner').classList.remove('hidden');
          }
        }

        if (negocio.analytics_id) initGA4(negocio.analytics_id);
      })
      .catch(() => {
        document.getElementById('catalog-root').innerHTML = `<p class="text-center text-stone py-20 font-serif italic">No se pudo cargar el catálogo.</p>`;
      });

    // ── Scroll ────────────────────────────────────────────────────────────────────
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const total = document.documentElement.scrollHeight - window.innerHeight;
      document.getElementById('scroll-progress').style.width = (total > 0 ? (scrolled / total) * 100 : 0) + '%';
      document.getElementById('back-to-top').classList.toggle('show', scrolled > 300);
    }, { passive: true });

    // ── SW ────────────────────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
