<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Biga — Catálogo online</title>
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F2EDE5;
      color: #3A3429;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: #FAF7F2;
      border: 1px solid rgba(196,149,106,0.2);
      padding: 40px 48px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .logo {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 24px;
      display: block; border: 1.5px solid rgba(196,149,106,0.3);
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 700;
      color: #3A3429; margin-bottom: 4px;
    }

    .tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic; font-size: 14px;
      color: #C4956A; margin-bottom: 28px;
    }

    #qr-box { margin: 0 auto 24px; display: flex; justify-content: center; }
    #qr-box img, #qr-box canvas { display: block; }

    .divider {
      width: 3rem; height: 1px;
      background: rgba(196,149,106,0.25);
      margin: 0 auto 20px;
    }

    .cta {
      font-size: 11px; letter-spacing: 0.25em;
      text-transform: uppercase; color: #8B857E;
      margin-bottom: 8px;
    }

    .url {
      font-size: 11px; color: #C4956A;
      word-break: break-all;
    }

    .brand {
      margin-top: 28px;
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(58,52,41,0.2);
    }

    @media print {
      body { background: white; padding: 0; }
      .card { border: none; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="./logo.png" alt="Biga" class="logo">
    <h1>Biga</h1>
    <p class="tagline">El sabor del tiempo</p>
    <div id="qr-box"></div>
    <div class="divider"></div>
    <p class="cta">Escaneá para ver nuestro catálogo</p>
    <p class="url" id="url-display"></p>
    <p class="brand">Las Flores, Buenos Aires · Argentina</p>
  </div>

  <script>
    const url = 'https://juliancarroccio.github.io/pushcommerce/pages/biga/tienda.html';
    document.getElementById('url-display').textContent = url;
    new QRCode(document.getElementById('qr-box'), {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#3A3429',
      colorLight: '#FAF7F2',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
