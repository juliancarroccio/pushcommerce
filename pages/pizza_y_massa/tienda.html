<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pizza & Massa — Pedí online. Pizzas y empanadas artesanales en Las Flores.">
<meta name="theme-color" content="#0f0f0f">
<title>Carta Online — Pizza & Massa</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./img/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #c0392b;
  --red-light: #e74c3c;
  --green:     #27ae60;
  --dark:      #0f0f0f;
  --surface:   #181818;
  --surface2:  #222;
  --surface3:  #2a2a2a;
  --text:      #f0ece8;
  --muted:     #888;
  --border:    rgba(255,255,255,0.07);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'Inter', system-ui, sans-serif;
}

html { scroll-behavior: smooth; }
body { background: var(--dark); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }

/* Scroll progress */
#scroll-progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: var(--red); z-index: 1000; }

/* Header */
#header {
  position: sticky; top: 0; z-index: 800;
  background: rgba(15,15,15,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-main {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 1.25rem; gap: 0.75rem;
}
.back-btn {
  color: var(--muted); text-decoration: none; font-size: 0.85rem;
  display: flex; align-items: center; gap: 0.4rem; white-space: nowrap;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--text); }
.header-brand {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.header-brand img { height: 38px; width: auto; }
.cart-btn {
  background: var(--red); color: #fff; border: none; border-radius: 8px;
  padding: 0.55rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; transition: background 0.2s;
}
.cart-btn:hover { background: var(--red-light); }
.cart-badge {
  background: #fff; color: var(--red); border-radius: 999px;
  font-size: 0.7rem; font-weight: 700; min-width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center; padding: 0 4px;
}
/* Category pills */
.cat-pills {
  display: flex; gap: 0.5rem; padding: 0.6rem 1.25rem; overflow-x: auto;
  scrollbar-width: none; border-bottom: 1px solid var(--border);
}
.cat-pills::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0; background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); padding: 0.35rem 0.9rem; border-radius: 999px;
  font-size: 0.78rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.pill.active { background: var(--red); color: #fff; border-color: var(--red); }
/* Search */
.search-bar {
  padding: 0.6rem 1.25rem; display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.55rem 0.9rem; color: var(--text); font-size: 0.85rem; font-family: var(--font-body);
  outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(192,57,43,0.4); }
.search-clear {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 0 0.8rem; font-size: 0.9rem; cursor: pointer;
  display: none; transition: color 0.2s;
}
.search-clear:hover { color: var(--text); }

/* Status + Offer banners */
.status-banner {
  margin: 1rem 1.25rem 0; padding: 0.6rem 1rem; border-radius: 8px;
  font-size: 0.82rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
}
.status-open   { background: rgba(39,174,96,0.12); color: var(--green); border: 1px solid rgba(39,174,96,0.2); }
.status-closed { background: rgba(192,57,43,0.1);  color: var(--red-light); border: 1px solid rgba(192,57,43,0.2); }
#offer-banner-tienda {
  margin: 0.75rem 1.25rem; padding: 0.85rem 1rem;
  background: linear-gradient(135deg, #96281b, var(--red));
  border-radius: 10px; display: none;
}
#offer-banner-tienda.visible { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.offer-info .offer-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; }
.offer-info .offer-name  { font-weight: 600; font-size: 0.95rem; margin: 0.15rem 0; }
.offer-info .offer-prices { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; }
.offer-orig  { text-decoration: line-through; opacity: 0.55; }
.offer-final { font-weight: 700; }
.offer-pct   { background: rgba(0,0,0,0.25); border-radius: 4px; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: 700; }
.offer-add-btn {
  background: rgba(0,0,0,0.25); color: #fff; border: 1px solid rgba(255,255,255,0.3);
  padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: background 0.2s;
}
.offer-add-btn:hover { background: rgba(0,0,0,0.45); }

/* Catalog */
main { padding: 1rem 1.25rem 6rem; }

/* Skeleton */
.skeleton-section { margin-bottom: 2rem; }
.skeleton-title { height: 22px; width: 120px; background: var(--surface2); border-radius: 6px; margin-bottom: 1rem; animation: shimmer 1.4s infinite; }
.skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.skeleton-card { height: 280px; background: var(--surface2); border-radius: 12px; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

.cat-section { margin-bottom: 2.5rem; display: none; }
.cat-section.visible { display: block; }
.cat-title {
  font-family: var(--font-display); font-style: italic; font-weight: 700;
  font-size: 1.4rem; color: var(--text); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem;
}
.cat-divider { height: 1px; background: var(--border); margin-bottom: 1.25rem; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }

.pcard {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s;
}
.pcard:hover { border-color: rgba(192,57,43,0.3); }
.pcard.offer-item { border-color: rgba(192,57,43,0.4); }
.pcard-img {
  width: 100%; aspect-ratio: 4/3; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
  border-bottom: 1px solid var(--border); position: relative; overflow: hidden;
}
.pcard-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.offer-badge-card {
  position: absolute; top: 0.5rem; left: 0.5rem;
  background: var(--red); color: #fff; font-size: 0.65rem; font-weight: 700;
  padding: 0.2rem 0.5rem; border-radius: 4px;
}
.pcard-body { padding: 0.9rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; }
.pcard-name { font-weight: 600; font-size: 0.92rem; margin-bottom: 0.25rem; }
.pcard-desc { color: var(--muted); font-size: 0.76rem; line-height: 1.5; flex: 1; margin-bottom: 0.75rem; }
.pcard-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
.price-wrap { display: flex; flex-direction: column; }
.price-orig { text-decoration: line-through; color: var(--muted); font-size: 0.75rem; }
.price-main { font-size: 1rem; font-weight: 600; }
.add-btn {
  background: var(--red); color: #fff; border: none; border-radius: 8px;
  padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s, transform 0.1s; white-space: nowrap;
}
.add-btn:hover { background: var(--red-light); }
.add-btn:active { transform: scale(0.97); }
.no-results { color: var(--muted); text-align: center; padding: 3rem 1rem; font-size: 0.9rem; display: none; }

/* Cart drawer */
#cart-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px);
}
#cart-backdrop.open { opacity: 1; pointer-events: auto; }
#cart-drawer {
  position: fixed; top: 0; right: 0; height: 100%; width: min(420px, 100vw);
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 910; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#cart-drawer.open { transform: translateX(0); }
.cart-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 1.25rem; border-bottom: 1px solid var(--border);
}
.cart-title { font-weight: 700; font-size: 1rem; }
.cart-close {
  background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px;
}
.cart-close:hover { background: var(--surface2); color: var(--text); }
.cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
.cart-empty { color: var(--muted); text-align: center; padding: 3rem 1rem; font-size: 0.9rem; }
.cart-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.85rem 0; border-bottom: 1px solid var(--border);
}
.cart-item:last-child { border-bottom: none; }
.cart-item-icon { font-size: 1.5rem; flex-shrink: 0; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-price { font-size: 0.78rem; color: var(--muted); }
.qty-ctrl { display: flex; align-items: center; gap: 0.4rem; }
.qty-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  width: 28px; height: 28px; border-radius: 6px; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.qty-btn:hover { background: var(--surface3); }
.qty-num { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }
.del-btn { background: none; border: none; color: var(--muted); font-size: 0.9rem; cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.2s; }
.del-btn:hover { color: var(--red-light); }
.cart-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
.cart-note-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
.cart-note {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.6rem 0.8rem; color: var(--text); font-family: var(--font-body);
  font-size: 0.82rem; resize: none; height: 60px; outline: none; margin-bottom: 0.85rem;
}
.cart-total { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.4rem; }
.cart-total-label { font-size: 0.85rem; color: var(--muted); }
.cart-total-amount { font-size: 1.2rem; font-weight: 700; }
.cart-disclaimer { font-size: 0.68rem; color: var(--muted); margin-bottom: 1rem; }
.cart-send-btn {
  width: 100%; background: #25D366; color: #fff; border: none; border-radius: 10px;
  padding: 0.9rem; font-size: 0.92rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: opacity 0.2s; margin-bottom: 0.5rem;
}
.cart-send-btn:hover { opacity: 0.9; }
.cart-clear-btn {
  width: 100%; background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 8px; padding: 0.6rem; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.cart-clear-btn:hover { border-color: rgba(192,57,43,0.4); color: var(--red-light); }

/* FAB carrito mobile */
#cart-fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 800;
  background: var(--red); color: #fff; border: none; border-radius: 999px;
  padding: 0.8rem 1.25rem; font-size: 0.85rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(192,57,43,0.5); display: none; align-items: center; gap: 0.5rem;
  transition: background 0.2s, transform 0.15s;
}
#cart-fab:hover { background: var(--red-light); transform: translateY(-2px); }
#cart-fab.show { display: flex; }
#cart-fab-badge { background: #fff; color: var(--red); border-radius: 999px; font-size: 0.7rem; padding: 0 6px; min-width: 18px; text-align: center; }

/* Back to top */
#back-to-top {
  position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 800;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#back-to-top.visible { opacity: 1; pointer-events: auto; }

@media (max-width: 500px) {
  .products-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="scroll-progress"></div>

<!-- Header -->
<div id="header">
  <div class="header-main">
    <a href="./index.html" class="back-btn">← Inicio</a>
    <div class="header-brand">
      <img src="./img/logo.png" alt="Pizza & Massa">
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Pedido <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
  <div class="cat-pills" id="cat-pills"></div>
  <div class="search-bar">
    <input class="search-input" id="search-input" type="search" placeholder="Buscar pizza, empanada...">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- Status banner -->
<div class="status-banner" id="status-banner">⏳ Calculando...</div>

<!-- Offer banner -->
<div id="offer-banner-tienda">
  <div class="offer-info">
    <div class="offer-label">Pizza de la semana</div>
    <div class="offer-name" id="ofr-nombre"></div>
    <div class="offer-prices">
      <span class="offer-orig" id="ofr-orig"></span>
      <span class="offer-final" id="ofr-final"></span>
      <span class="offer-pct" id="ofr-pct"></span>
    </div>
  </div>
  <button class="offer-add-btn" id="ofr-add-btn">+ Agregar</button>
</div>

<main id="catalog">
  <!-- Skeleton -->
  <div id="skeleton">
    <div class="skeleton-section"><div class="skeleton-title"></div><div class="skeleton-grid"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div></div>
    <div class="skeleton-section"><div class="skeleton-title"></div><div class="skeleton-grid"><div class="skeleton-card"></div><div class="skeleton-card"></div></div></div>
  </div>
</main>

<p class="no-results" id="no-results">No se encontraron resultados para tu búsqueda.</p>

<!-- Cart drawer -->
<div id="cart-backdrop" onclick="closeCart()"></div>
<div id="cart-drawer" role="dialog" aria-label="Carrito de pedido">
  <div class="cart-header">
    <span class="cart-title">🛒 Tu pedido</span>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <p class="cart-empty">Tu carrito está vacío.<br>Agregá productos de la carta.</p>
  </div>
  <div class="cart-footer">
    <p class="cart-note-label">Nota para el pedido (opcional)</p>
    <textarea class="cart-note" id="cart-note" placeholder="Ej: sin aceitunas, extra mozzarella..."></textarea>
    <div class="cart-total">
      <span class="cart-total-label">Total estimado</span>
      <span class="cart-total-amount" id="cart-total">$0</span>
    </div>
    <p class="cart-disclaimer">* Los precios son orientativos. El negocio confirmará el total.</p>
    <button class="cart-send-btn" onclick="sendWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido por WhatsApp
    </button>
    <button class="cart-clear-btn" onclick="clearCart()">Vaciar carrito</button>
  </div>
</div>

<button id="cart-fab" onclick="openCart()">🛒 Ver pedido <span id="cart-fab-badge">0</span></button>
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Volver arriba">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>

const CART_KEY = 'cart_pizza_y_massa';
let cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
let allData = null;

function fmtPrecio(n) { return '$' + n.toLocaleString('es-AR'); }

function saveCart() { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }

function cartTotal() { return cart.reduce((s, i) => s + i.precio * i.qty, 0); }

function updateCartUI() {
  const total = cartTotal();
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total').textContent = fmtPrecio(total);
  document.getElementById('cart-fab-badge').textContent = count;
  document.getElementById('cart-fab').classList.toggle('show', count > 0);
  renderCartItems();
}

function renderCartItems() {
  const el = document.getElementById('cart-items');
  if (!cart.length) {
    el.innerHTML = '<p class="cart-empty">Tu carrito está vacío.<br>Agregá productos de la carta.</p>';
    return;
  }
  el.innerHTML = cart.map(item => `
    <div class="cart-item" data-id="${item.id}">
      <span class="cart-item-icon">${item.icono || '🍕'}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.nombre}</div>
        <div class="cart-item-price">${fmtPrecio(item.precio)} c/u</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, +1)">+</button>
      </div>
      <button class="del-btn" onclick="removeItem(${item.id})" title="Eliminar">✕</button>
    </div>`).join('');
}

function addToCart(id, nombre, precio, icono) {
  const existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({ id, nombre, precio, icono: icono || '🍕', qty: 1 });
  saveCart(); updateCartUI();
  const btn = document.querySelector(`[data-add="${id}"]`);
  if (btn) { btn.textContent = '✓'; btn.style.background = 'var(--green)'; setTimeout(() => { btn.textContent = '+ Agregar'; btn.style.background = ''; }, 900); }
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  saveCart(); updateCartUI();
}

function removeItem(id) { cart = cart.filter(i => i.id !== id); saveCart(); updateCartUI(); }

function clearCart() { if (!confirm('¿Vaciar el carrito?')) return; cart = []; saveCart(); updateCartUI(); }

function openCart()  { document.getElementById('cart-drawer').classList.add('open'); document.getElementById('cart-backdrop').classList.add('open'); }
function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('cart-backdrop').classList.remove('open'); }

function sendWhatsApp() {
  if (!cart.length) { alert('Agregá al menos un producto antes de enviar.'); return; }
  if (!allData) { alert("El menú no está disponible en este momento."); return; }
    const neg = allData.negocio;
  const nota = document.getElementById('cart-note').value.trim();
  const bycat = {};
  cart.forEach(item => {
    const cat = item.cat || 'Productos';
    if (!bycat[cat]) bycat[cat] = [];
    bycat[cat].push(`• ${item.nombre} x${item.qty} — ${fmtPrecio(item.precio * item.qty)}`);
  });
  let lines = [`Hola! Quiero hacer un pedido en ${neg.nombre}.`, ''];
  lines.push('📋 *Pedido:*');
  Object.entries(bycat).forEach(([cat, items]) => {
    lines.push(`\n*${cat}*`);
    lines.push(...items);
  });
  lines.push('', `💰 *Total estimado: ${fmtPrecio(cartTotal())}*`);
  if (nota) lines.push('', `📝 Nota: ${nota}`);
  window.open(`https://wa.me/${neg.whatsapp}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
}

function buildStatus(data) {
  const dias = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
  const ahora = new Date();
  const minAhora = ahora.getHours() * 60 + ahora.getMinutes();
  const hoyIdx = ahora.getDay() === 0 ? 6 : ahora.getDay() - 1;
  const turnos = data.horarios[dias[hoyIdx]] || [];
  const abierto = turnos.some(t => {
    const [ah, am] = t.abre.split(':').map(Number);
    const [ch, cm] = t.cierra.split(':').map(Number);
    return minAhora >= ah * 60 + am && minAhora < ch * 60 + cm;
  });
  const banner = document.getElementById('status-banner');
  if (abierto) {
    banner.className = 'status-banner status-open';
    const cierre = turnos.find(t => { const [ch,cm]=t.cierra.split(':').map(Number); return minAhora<ch*60+cm; });
    banner.textContent = `✅ Abierto ahora · Cerramos a las ${cierre ? cierre.cierra : '23:00'} hs`;
  } else {
    banner.className = 'status-banner status-closed';
    banner.textContent = '🔴 Cerrado · Abrimos todos los días a las 7:00 hs';
  }
}

function buildOffer(data) {
  if (!data.oferta || !data.oferta.activa) return;
  const allProds = data.categorias.flatMap(c => c.productos);
  const prod = allProds.find(p => p.id === data.oferta.producto_id);
  if (!prod) return;
  const pct = Math.round((1 - data.oferta.precio_oferta / prod.precio) * 100);
  document.getElementById('ofr-nombre').textContent = prod.nombre;
  document.getElementById('ofr-orig').textContent = fmtPrecio(prod.precio);
  document.getElementById('ofr-final').textContent = fmtPrecio(data.oferta.precio_oferta);
  document.getElementById('ofr-pct').textContent = '-' + pct + '%';
  const offerBanner = document.getElementById('offer-banner-tienda');
  offerBanner.classList.add('visible');
  const catIcono = (data.categorias.find(c => c.productos.some(p => p.id === prod.id)) || {}).icono || '🍕';
  document.getElementById('ofr-add-btn').onclick = () => addToCart(prod.id, prod.nombre, data.oferta.precio_oferta, catIcono);
}

function buildCatalog(data) {
  allData = data;
  document.getElementById('skeleton').remove();
  const main = document.getElementById('catalog');
  const pillsEl = document.getElementById('cat-pills');

  const allPill = document.createElement('button');
  allPill.className = 'pill active'; allPill.textContent = 'Todos';
  allPill.onclick = () => filterCat('all', allPill);
  pillsEl.appendChild(allPill);

  data.categorias.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'pill'; pill.textContent = cat.icono + ' ' + cat.nombre;
    pill.onclick = () => filterCat(cat.id, pill);
    pillsEl.appendChild(pill);

    const section = document.createElement('div');
    section.className = 'cat-section visible'; section.dataset.catId = cat.id;
    section.innerHTML = `<h2 class="cat-title">${cat.icono} ${cat.nombre}</h2><div class="cat-divider"></div>`;

    const grid = document.createElement('div');
    grid.className = 'products-grid';

    cat.productos.forEach(p => {
      const isOffer = data.oferta && data.oferta.activa && data.oferta.producto_id === p.id;
      const displayPrice = isOffer ? data.oferta.precio_oferta : p.precio;
      const card = document.createElement('div');
      card.className = 'pcard' + (isOffer ? ' offer-item' : '');
      card.dataset.search = p.nombre.toLowerCase() + ' ' + p.descripcion.toLowerCase();
      const imgHtml = p.imagen
        ? `<div class="pcard-img">${isOffer ? '<span class="offer-badge-card">Oferta</span>' : ''}<img src="${p.imagen}" alt="${p.nombre}" loading="lazy"></div>`
        : `<div class="pcard-img">${isOffer ? '<span class="offer-badge-card">Oferta</span>' : ''}${cat.icono}</div>`;
      const priceHtml = isOffer
        ? `<div class="price-wrap"><span class="price-orig">${fmtPrecio(p.precio)}</span><span class="price-main" style="color:var(--red-light)">${fmtPrecio(displayPrice)}</span></div>`
        : `<div class="price-wrap"><span class="price-main">${fmtPrecio(p.precio)}</span></div>`;
      card.innerHTML = `${imgHtml}
        <div class="pcard-body">
          <div class="pcard-name">${p.nombre}</div>
          <div class="pcard-desc">${p.descripcion}</div>
          <div class="pcard-footer">
            ${priceHtml}
            <button class="add-btn" data-add="${p.id}" onclick="addToCart(${p.id},'${p.nombre.replace(/'/g,"\\'")}',${displayPrice},'${cat.icono}')">+ Agregar</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    section.appendChild(grid);
    main.appendChild(section);
  });

  gsap.from('.cat-section', { y: 40, opacity: 0, stagger: 0.1, duration: 0.55, ease: 'power2.out' });

  buildOffer(data);
  buildStatus(data);
  setupSearch(data);
  updateCartUI();
}

function filterCat(id, clickedPill) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  clickedPill.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => {
    s.classList.toggle('visible', id === 'all' || s.dataset.catId == id);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setupSearch(data) {
  const input = document.getElementById('search-input');
  const clearBtn = document.getElementById('search-clear');
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'flex' : 'none';
    let anyVisible = false;
    document.querySelectorAll('.cat-section').forEach(section => {
      section.classList.add('visible');
      let catHasResults = false;
      section.querySelectorAll('.pcard').forEach(card => {
        const match = !q || card.dataset.search.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) catHasResults = true;
      });
      section.style.display = catHasResults ? '' : 'none';
      if (catHasResults) anyVisible = true;
    });
    document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
    if (q) { document.querySelectorAll('.pill').forEach(p => p.classList.remove('active')); document.querySelector('.pill').classList.add('active'); }
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.querySelectorAll('.pcard').forEach(c => c.style.display = '');
  document.querySelectorAll('.cat-section').forEach(s => { s.classList.add('visible'); s.style.display = ''; });
  document.getElementById('no-results').style.display = 'none';
}

window.addEventListener('scroll', () => {
  const pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
  document.getElementById('scroll-progress').style.width = pct + '%';
  document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
});

fetch('./productos.json')
  .then(r => r.json())
  .then(buildCatalog)
  .catch(() => {});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
