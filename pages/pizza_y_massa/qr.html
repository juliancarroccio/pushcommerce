<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR — Pizza & Massa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { width: 360px; text-align: center; padding: 2.5rem 2rem; border: 1px solid #e0e0e0; }
  .logo-wrap { margin-bottom: 1.5rem; }
  .logo-img { height: 90px; width: auto; display: block; margin: 0 auto; }
  .tagline { font-size: 0.75rem; color: #9e9e9e; letter-spacing: 0.07em; margin-top: 0.4rem; }
  .divider { width: 40px; height: 2px; background: #c0392b; margin: 1.25rem auto; }
  #qr-box { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  #qr-box img, #qr-box canvas { border: 8px solid #fff; outline: 1px solid #e0e0e0; }
  .scan-text { font-size: 0.72rem; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .url { font-size: 0.65rem; color: #aaa; word-break: break-all; margin-bottom: 1.25rem; }
  .divider2 { width: 100%; height: 1px; background: #e8e8e8; margin-bottom: 1.25rem; }
  .direccion { font-size: 0.78rem; color: #555; margin-bottom: 0.3rem; }
  .powered { font-size: 0.65rem; color: #ccc; margin-top: 1.25rem; }
  @media print {
    body { background: white; padding: 0; }
    .card { border: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img" src="./img/logo.png" alt="Pizza & Massa">
    <p class="tagline">Pizzería artesanal · Las Flores, Buenos Aires</p>
  </div>
  <div class="divider"></div>
  <div id="qr-box"></div>
  <p class="scan-text">Escaneá para ver nuestros productos</p>
  <p class="url">juliancarroccio.github.io/pushcommerce/pages/pizza_y_massa/tienda.html</p>
  <div class="divider2"></div>
  <p class="direccion">Leandro N. Alem 610, Las Flores</p>
  <p class="direccion">☎ 02244 44-4110</p>
  <p class="powered">Sitio web por PushCommerce</p>
</div>
<script>
new QRCode(document.getElementById('qr-box'), {
  text: 'https://juliancarroccio.github.io/pushcommerce/pages/pizza_y_massa/tienda.html',
  width: 220,
  height: 220,
  colorDark: '#c0392b',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
