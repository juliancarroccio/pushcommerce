<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Página no encontrada — JD Muebles</title>
  <link rel="icon" href="./img/logo-JD.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF7F2; --sand: #D5BFA3; --sand-deep: #B99972;
      --ink: #2B2825; --line: #EAE2D6;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--cream); color: var(--ink);
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; font-weight: 300;
      animation: fadeIn .6s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    img { width: min(240px, 60vw); height: auto; margin: 0 auto 10px; display: block; }
    h1 {
      font-family: 'Lora', serif; font-weight: 600;
      font-size: clamp(4rem, 14vw, 7rem); margin: 0;
      color: var(--sand-deep); line-height: 1;
    }
    p { color: #7A7264; margin: 14px 0 30px; font-size: 1rem; }
    a {
      display: inline-block; padding: 14px 32px;
      background: var(--ink); color: #FFF;
      border: 1px solid var(--ink); border-radius: 999px;
      font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 500; text-decoration: none; transition: all .25s;
    }
    a:hover { background: transparent; color: var(--ink); }
  </style>
</head>
<body>
  <div>
    <img src="./img/logo-JD.png" alt="JD — Jonathan Dantas" />
    <h1>404</h1>
    <p>Esta página no existe. Pero los muebles sí.</p>
    <a href="./index.html">Volver al inicio</a>
  </div>
</body>
</html>
