<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artistas — MAPA Espacio de Arte</title>
<meta name="description" content="Conocé a los 23 artistas visuales de MAPA Espacio de Arte, Las Flores, Buenos Aires.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #000; --white: #fff; --gray-100: #f4f4f4; --gray-200: #e0e0e0; --gray-400: #9e9e9e; --gray-600: #555; --font-display: 'Reem Kufi', sans-serif; --font-body: 'Inter', sans-serif; }
  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--black); font-family: var(--font-body); font-weight: 300; line-height: 1.7; }

  #scroll-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0; background: var(--black); z-index: 9999; }

  nav { position: sticky; top: 0; z-index: 800; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; background: var(--white); border-bottom: 1px solid var(--gray-200); }
  .nav-logo { font-family: var(--font-display); font-weight: 700; font-size: 1.25rem; letter-spacing: 0.15em; text-decoration: none; color: var(--black); }
  .nav-back { font-family: var(--font-display); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
  .nav-back:hover { color: var(--black); }
  .cart-btn { position: relative; background: var(--black); color: var(--white); border: none; cursor: pointer; padding: 0.5rem 1rem; font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; }
  .cart-count { background: white; color: black; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 600; display: none; }
  .cart-count.has-items { display: flex; }

  .page-header { padding: 4rem 3rem 3rem; border-bottom: 1px solid var(--gray-200); }
  .page-header .label { font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 0.75rem; }
  .page-header h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 4rem); line-height: 1; }

  /* GRID */
  .artistas-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--gray-200); }
  .artista-card { background: var(--white); cursor: pointer; }
  .artista-card a { display: block; text-decoration: none; color: inherit; }
  .artista-img-wrap { aspect-ratio: 1; overflow: hidden; background: var(--gray-100); }
  .artista-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.5s, transform 0.6s; }
  .artista-card:hover .artista-img { filter: grayscale(20%); transform: scale(1.04); }
  .artista-info { padding: 1.25rem; border-top: 1px solid var(--gray-200); }
  .artista-nombre { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.25rem; }
  .artista-obras-count { font-size: 0.75rem; color: var(--gray-400); }
  @media (max-width: 900px) { .artistas-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .artistas-grid { grid-template-columns: repeat(2, 1fr); } .page-header { padding: 3rem 1.5rem 2rem; } }

  /* SKELETON */
  .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* CART DRAWER */
  #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 900; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #cart-overlay.open { opacity: 1; pointer-events: auto; }
  #cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 100vw); z-index: 901; background: var(--white); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.4s cubic-bezier(.32,.72,0,1); }
  #cart-drawer.open { transform: translateX(0); }
  .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
  .cart-header h2 { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .cart-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--gray-400); }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
  .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--gray-400); font-size: 0.875rem; }
  .cart-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--gray-200); }
  .cart-item-img { width: 64px; height: 64px; object-fit: cover; flex-shrink: 0; filter: grayscale(100%); }
  .cart-item-body { flex: 1; }
  .cart-item-artista { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); }
  .cart-item-titulo { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; }
  .cart-item-price { font-size: 0.875rem; color: var(--gray-600); margin-top: 0.25rem; }
  .cart-item-remove { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 0.75rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.25rem; }
  .cart-footer { padding: 1.5rem; border-top: 1px solid var(--gray-200); }
  .cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; font-family: var(--font-display); }
  .cart-total-label { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); }
  .cart-total-amount { font-weight: 600; }
  .cart-disclaimer { font-size: 0.72rem; color: var(--gray-400); margin-bottom: 1.5rem; line-height: 1.5; }
  .cart-note { width: 100%; border: 1px solid var(--gray-200); padding: 0.75rem; font-family: var(--font-body); font-size: 0.85rem; resize: none; margin-bottom: 1rem; color: var(--black); }
  .cart-note:focus { outline: none; border-color: var(--black); }
  .btn-wa { width: 100%; background: var(--black); color: var(--white); border: none; padding: 1rem; font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn-wa:hover { background: #333; }
  .btn-clear { width: 100%; background: none; border: 1px solid var(--gray-200); color: var(--gray-400); padding: 0.6rem; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; }
  .btn-clear:hover { border-color: var(--black); color: var(--black); }

  /* FAB */
  #cart-fab { position: fixed; bottom: 2rem; right: 2rem; z-index: 800; background: var(--black); color: var(--white); border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  #cart-fab.visible { display: flex; }
  #cart-fab-count { position: absolute; top: 4px; right: 4px; background: #fff; color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  footer { padding: 2rem 3rem; border-top: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--gray-400); flex-wrap: wrap; gap: 1rem; }
  footer a { color: inherit; text-decoration: none; }
  footer a:hover { color: var(--black); }
  .nav-logo { display: flex; align-items: center; }
  .nav-logo-img { height: 40px; display: block; }
</style>
</head>
<body>

<div id="scroll-progress"></div>

<nav>
  <a class="nav-back" href="./index.html">← MAPA</a>
  <a class="nav-logo" href="./artistas.html">Artistas</a>
  <button class="cart-btn" id="cart-open-btn" onclick="openCart()">
    <span>Pedido</span>
    <span class="cart-count" id="cart-count-nav">0</span>
  </button>
</nav>

<div class="page-header">
  <p class="label">MAPA Espacio de Arte</p>
  <h1>Los artistas</h1>
</div>

<main id="main-grid">
  <!-- Skeleton placeholders -->
  <div class="artistas-grid" id="artistas-grid">
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
    <div class="artista-card"><div class="artista-img-wrap skeleton"></div><div class="artista-info"><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:40%"></div></div></div>
  </div>
</main>

<footer>
  <span>© MAPA Espacio de Arte, Las Flores, Buenos Aires</span>
  <a href="https://github.com/juliancarroccio" target="_blank">PushCommerce</a>
</footer>

<!-- CART DRAWER -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer" role="dialog" aria-label="Carrito">
  <div class="cart-header">
    <h2>Tu pedido</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">Estimado</span>
      <span class="cart-total-amount" id="cart-total">$0</span>
    </div>
    <p class="cart-disclaimer">Los precios son orientativos. El valor final se coordina con MAPA. "Consultar precio" significa que el precio se acuerda directamente con el espacio.</p>
    <textarea class="cart-note" id="cart-note" rows="2" placeholder="Nota adicional (opcional)..."></textarea>
    <button class="btn-wa" onclick="sendWhatsApp()">Consultar por WhatsApp</button>
    <button class="btn-clear" onclick="clearCart()">Vaciar pedido</button>
  </div>
</div>

<button id="cart-fab" onclick="openCart()">
  🛒
  <span id="cart-fab-count">0</span>
</button>

<script>
gsap.registerPlugin(ScrollTrigger);

const WHATSAPP = '5491112345678';
const CART_KEY = 'mapa_cart';
let _data = null;
let _cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');

// Scroll progress
const bar = document.getElementById('scroll-progress');
window.addEventListener('scroll', () => {
  bar.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%';
});

// Scroll to hash
window.addEventListener('load', () => {
  const hash = location.hash.slice(1);
  if (hash) {
    const el = document.getElementById(hash);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

fetch('./artistas.json')
  .then(r => r.json())
  .then(data => { _data = data; buildGrid(data); })
  .catch(() => {});

function buildGrid(data) {
  const grid = document.getElementById('artistas-grid');
  grid.innerHTML = data.artistas.map(a => `
    <div class="artista-card" id="${a.slug}">
      <a href="./artista.html?slug=${a.slug}">
        <div class="artista-img-wrap">
          <img class="artista-img" src="${a.retrato}" alt="${a.nombre}" loading="lazy">
        </div>
        <div class="artista-info">
          <p class="artista-nombre">${a.nombre}</p>
          <p class="artista-obras-count">${a.obras.length} obra${a.obras.length !== 1 ? 's' : ''}</p>
        </div>
      </a>
    </div>
  `).join('');

  gsap.from('.artista-card', {
    opacity: 0, y: 20, duration: 0.5, stagger: 0.05,
    scrollTrigger: { trigger: grid, start: 'top 90%' }
  });
  updateCartUI();
}

// CART
function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  renderCartItems();
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
}

function addToCart(obra, artista) {
  const key = `${artista.slug}-${obra.titulo}`;
  if (!_cart.find(i => i.key === key)) {
    _cart.push({ key, slug: artista.slug, nombre: artista.nombre, titulo: obra.titulo, imagen: obra.imagen, precio: obra.precio, precio_visible: obra.precio_visible });
    saveCart();
    updateCartUI();
  }
}

function removeFromCart(key) {
  _cart = _cart.filter(i => i.key !== key);
  saveCart();
  updateCartUI();
  renderCartItems();
}

function clearCart() {
  _cart = [];
  saveCart();
  updateCartUI();
  renderCartItems();
}

function saveCart() {
  localStorage.setItem(CART_KEY, JSON.stringify(_cart));
}

function updateCartUI() {
  const n = _cart.length;
  document.getElementById('cart-count-nav').textContent = n;
  document.getElementById('cart-count-nav').classList.toggle('has-items', n > 0);
  document.getElementById('cart-fab-count').textContent = n;
  document.getElementById('cart-fab').classList.toggle('visible', n > 0);
}

function renderCartItems() {
  const el = document.getElementById('cart-items');
  if (_cart.length === 0) {
    el.innerHTML = '<p class="cart-empty">No hay obras en tu pedido.</p>';
    document.getElementById('cart-total').textContent = '$0';
    return;
  }
  el.innerHTML = _cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.imagen}" alt="${item.titulo}" onerror="this.style.background='#f0f0f0'">
      <div class="cart-item-body">
        <p class="cart-item-artista">${item.nombre}</p>
        <p class="cart-item-titulo">${item.titulo}</p>
        <p class="cart-item-price">${item.precio_visible ? '$' + item.precio.toLocaleString('es-AR') : 'Consultar precio'}</p>
        <button class="cart-item-remove" onclick="removeFromCart('${item.key}')">✕ Quitar</button>
      </div>
    </div>
  `).join('');
  const total = _cart.filter(i => i.precio_visible).reduce((s, i) => s + i.precio, 0);
  document.getElementById('cart-total').textContent = total > 0 ? '$' + total.toLocaleString('es-AR') : 'A consultar';
}

function sendWhatsApp() {
  if (_cart.length === 0) return;
  const note = document.getElementById('cart-note').value.trim();
  let lines = ['Hola! Me contacto desde el sitio de MAPA Espacio de Arte.', '', 'Estoy interesado/a en las siguientes obras:', ''];
  _cart.forEach(item => {
    const precio = item.precio_visible ? ` ($${item.precio.toLocaleString('es-AR')})` : ' (consultar precio)';
    lines.push(`• "${item.titulo}" — ${item.nombre}${precio}`);
  });
  if (note) { lines.push('', `Nota: ${note}`); }
  lines.push('', 'Quedo a la espera de más información. ¡Muchas gracias!');
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
}

// Allow artista pages to call addToCart
window.addToCart = addToCart;
window.openCart = openCart;
</script>
</body>
</html>
