<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cola de Pedidos — Cani Ventas</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="./img/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --noir:   #080C14;
      --slate:  #0D1820;
      --card:   #101C2C;
      --card2:  #152232;
      --brd:    rgba(86,188,109,0.14);
      --brd2:   rgba(86,188,109,0.07);
      --green:  #56BC6D;
      --green2: #3FA855;
      --cream:  #EDF5EE;
      --muted:  rgba(237,245,238,0.38);
      --c-pend: #EF4444;
      --c-espe: #F59E0B;
      --c-envi: #3B82F6;
      --c-reti: #10B981;
    }
    html, body { height: 100%; background: var(--noir); color: var(--cream); font-family: 'Manrope', sans-serif; }

    /* ── AUTH ── */
    #s-auth {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.25rem; padding: 2rem;
    }
    #s-auth img { height: 64px; width: auto; }
    #s-auth h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); }
    #s-auth p  { font-size: 0.85rem; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.6; }
    .auth-form { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 320px; }
    .auth-form input { width: 100%; padding: 0.6rem 0.875rem; background: var(--card); border: 1.5px solid var(--brd2); border-radius: 8px; color: var(--cream); font-size: 0.875rem; outline: none; font-family: 'Manrope', sans-serif; transition: border-color .15s; }
    .auth-form input:focus { border-color: var(--green); }
    .auth-form input::placeholder { color: var(--muted); }
    .auth-btn { background: var(--green); color: var(--noir); font-weight: 700; font-size: 0.875rem; padding: 0.7rem; border-radius: 8px; border: none; cursor: pointer; font-family: 'Manrope', sans-serif; transition: background .15s; }
    .auth-btn:hover { background: var(--green2); }
    .auth-link { display: inline-block; margin-top: 0.25rem; background: var(--green); color: var(--noir); font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.6rem 1.4rem; border-radius: 6px; text-decoration: none; font-weight: 700; text-align: center; width: 100%; max-width: 320px; }
    #auth-err { font-size: 0.78rem; color: #f87171; text-align: center; min-height: 1.2em; }

    /* ── APP ── */
    #s-app { display: none; flex-direction: column; height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--slate); border-bottom: 1px solid var(--brd2);
      padding: 0 1rem; height: 52px;
      display: flex; align-items: center; gap: 0.875rem;
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .hdr-logo  { height: 28px; width: auto; }
    .hdr-title { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--cream); }
    .hdr-tabs  { display: flex; gap: 0; margin-left: 1rem; }
    .hdr-tab {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.3rem 0.9rem; border: 1px solid var(--brd);
      background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Manrope', sans-serif;
    }
    .hdr-tab:first-child { border-radius: 6px 0 0 6px; }
    .hdr-tab:last-child  { border-radius: 0 6px 6px 0; }
    .hdr-tab:not(:first-child) { border-left: none; }
    .hdr-tab.active { background: var(--green); color: var(--noir); border-color: var(--green); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    #badge-pend {
      background: var(--c-pend); color: #fff; font-family: 'Syne', sans-serif;
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px;
      min-width: 1.6rem; text-align: center; display: none;
    }
    #btn-add {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(86,188,109,0.12); border: 1px solid rgba(86,188,109,0.35); color: var(--green);
      padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    #btn-add:hover { background: var(--green); color: var(--noir); }
    #btn-portal {
      font-size: 0.7rem; color: var(--muted); background: none; border: none; cursor: pointer;
      transition: color 0.15s; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'Manrope', sans-serif;
    }
    #btn-portal:hover { color: var(--cream); }

    /* ── KANBAN ── */
    #view-kanban {
      flex: 1; display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem; padding: 0.75rem; overflow: hidden;
    }
    @media (max-width: 900px) { #view-kanban { grid-template-columns: repeat(2, 1fr); overflow-y: auto; } }
    @media (max-width: 480px) { #view-kanban { grid-template-columns: 1fr; } }

    .col {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--brd2); border-radius: 10px; overflow: hidden; min-height: 0;
    }
    .col-hdr {
      padding: 0.6rem 0.875rem; display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid var(--brd2);
      font-family: 'Syne', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col[data-s="pendiente"] .dot { background: var(--c-pend); box-shadow: 0 0 5px var(--c-pend); }
    .col[data-s="esperando"] .dot { background: var(--c-espe); box-shadow: 0 0 5px var(--c-espe); }
    .col[data-s="enviado"]   .dot { background: var(--c-envi); box-shadow: 0 0 5px var(--c-envi); }
    .col[data-s="retirado"]  .dot { background: var(--c-reti); box-shadow: 0 0 5px var(--c-reti); }
    .col-count { margin-left: auto; color: var(--muted); font-size: 0.7rem; }

    .col-body { flex: 1; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; min-height: 0; }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }

    /* ── CARDS ── */
    .card {
      background: rgba(255,255,255,0.035); border: 1px solid var(--brd2);
      border-radius: 8px; padding: 0.75rem; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:none } }
    .card.flash { animation: flash 0.7s ease; }
    @keyframes flash { 0%,100%{border-color:var(--brd2)} 40%{border-color:var(--green);box-shadow:0 0 10px rgba(86,188,109,0.25)} }

    .card-meta   { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.4rem; }
    .card-num    { font-family: 'Syne', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); }
    .card-time   { font-size: 0.65rem; color: var(--muted); }
    .card-item   { font-size: 0.78rem; color: rgba(237,245,238,0.8); padding: 0.1rem 0; }
    .card-sep    { border: none; border-top: 1px solid var(--brd2); margin: 0.5rem 0; }
    .card-total  { font-family: 'Syne', sans-serif; font-size: 0.95rem; color: var(--green); }
    .card-nota   { font-size: 0.72rem; color: var(--muted); font-style: italic; margin-top: 0.4rem; padding: 0.35rem 0.5rem; background: rgba(0,0,0,0.15); border-radius: 5px; border-left: 2px solid rgba(86,188,109,0.3); }
    .card-cliente{ font-size: 0.78rem; font-weight: 600; color: var(--cream); margin-top: 0.4rem; }
    .card-dir    { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    .card-actions { display: flex; gap: 0.35rem; margin-top: 0.65rem; flex-wrap: wrap; }
    .btn-adv {
      flex: 1; font-family: 'Syne', sans-serif; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.4rem 0.5rem; border-radius: 5px; border: none; cursor: pointer; font-weight: 700; transition: all 0.15s; white-space: nowrap;
    }
    .btn-esperando { background: rgba(245,158,11,0.2); color: var(--c-espe); }
    .btn-esperando:hover { background: var(--c-espe); color: #1a1008; }
    .btn-enviado   { background: rgba(59,130,246,0.2); color: var(--c-envi); }
    .btn-enviado:hover { background: var(--c-envi); color: #fff; }
    .btn-retirado  { background: rgba(16,185,129,0.2); color: var(--c-reti); }
    .btn-retirado:hover { background: var(--c-reti); color: #fff; }
    .btn-icon {
      width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--brd2);
      background: none; color: var(--muted); cursor: pointer; font-size: 0.78rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--brd); }
    .btn-icon:disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
    .btn-del { color: #f87171; border-color: rgba(248,113,113,0.12); }
    .btn-del:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }

    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; opacity: 0.2; padding: 1.5rem; }
    .empty-icon { font-size: 1.6rem; }
    .empty-txt  { font-family: 'Syne', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── HISTORIAL ── */
    #view-historial { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
    #hist-toolbar {
      position: sticky; top: 0; z-index: 10; padding: 0.4rem 0.875rem;
      background: var(--noir); border-bottom: 1px solid var(--brd2);
      display: flex; justify-content: flex-end; flex-shrink: 0;
    }
    #btn-export-csv {
      font-family: 'Syne', sans-serif; font-size: 0.65rem; letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(86,188,109,0.1); border: 1px solid rgba(86,188,109,0.3); color: var(--green);
      padding: 0.3rem 0.7rem; border-radius: 5px; cursor: pointer; transition: all 0.15s;
    }
    #btn-export-csv:hover { background: var(--green); color: var(--noir); }
    #hist-content { padding: 1rem; }
    .hist-day { margin-bottom: 1.25rem; }
    .hist-day-hdr {
      font-family: 'Syne', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--brd2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .hist-day-body { display: flex; flex-direction: column; gap: 0.4rem; padding: 0.5rem 0; }
    .hist-row {
      background: rgba(255,255,255,0.025); border: 1px solid var(--brd2);
      border-radius: 7px; padding: 0.65rem 0.875rem;
      display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.8rem;
    }
    .hist-num   { font-family: 'Syne', sans-serif; font-size: 0.65rem; color: var(--muted); width: 2rem; flex-shrink: 0; padding-top: 0.1rem; }
    .hist-items { flex: 1; color: rgba(237,245,238,0.65); line-height: 1.5; }
    .hist-total { font-family: 'Syne', sans-serif; font-size: 0.85rem; color: var(--green); white-space: nowrap; }
    .hist-estado { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.15rem 0.4rem; border-radius: 4px; white-space: nowrap; margin-top: 0.2rem; }
    .hist-estado.pendiente  { background: rgba(239,68,68,0.15);  color: #f87171; }
    .hist-estado.esperando  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .hist-estado.enviado    { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .hist-estado.retirado   { background: rgba(16,185,129,0.15); color: #34d399; }
    .hist-nota  { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-top: 0.25rem; }
    .hist-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem; flex-shrink: 0; }

    /* ── MODAL ── */
    #modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
      display: none; align-items: flex-end; justify-content: center;
    }
    #modal-bg.open { display: flex; }
    #modal {
      background: var(--card); border: 1px solid var(--brd);
      border-radius: 16px 16px 0 0; padding: 1.25rem;
      width: 100%; max-width: 560px; max-height: 90vh;
      display: flex; flex-direction: column; gap: 0.875rem;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between; }
    .modal-hdr h3 { font-family: 'Syne', sans-serif; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cream); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; transition: color 0.15s; }
    .btn-close:hover { color: var(--cream); }
    #modal-search {
      width: 100%; padding: 0.6rem 0.875rem; background: var(--card2);
      border: 1px solid var(--brd); border-radius: 7px; color: var(--cream);
      font-size: 0.875rem; outline: none; transition: border-color 0.15s; font-family: 'Manrope', sans-serif;
    }
    #modal-search:focus { border-color: var(--green); }
    #modal-search::placeholder { color: var(--muted); }
    #modal-results { overflow-y: auto; max-height: 25vh; display: flex; flex-direction: column; gap: 0.25rem; }
    .prod-opt { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.75rem; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.025); border: 1px solid transparent; transition: all 0.12s; }
    .prod-opt:hover { background: var(--brd2); border-color: var(--brd); }
    .prod-opt-name  { flex: 1; font-size: 0.82rem; color: var(--cream); }
    .prod-opt-price { font-family: 'Syne', sans-serif; font-size: 0.82rem; color: var(--green); }
    #modal-cart { border-top: 1px solid var(--brd2); padding-top: 0.75rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .cart-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; }
    .cart-name { flex: 1; color: rgba(237,245,238,0.8); }
    .cart-qty  { display: flex; align-items: center; gap: 0.25rem; }
    .btn-qty   { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--brd); background: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .btn-qty:hover { background: var(--brd2); }
    .cart-qty-num { font-family: 'Syne', sans-serif; font-size: 0.85rem; color: var(--cream); min-width: 1rem; text-align: center; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.25rem; padding-top: 0.5rem; border-top: 1px solid var(--brd2); }
    .cart-total-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .cart-total-val { font-family: 'Syne', sans-serif; font-size: 1.05rem; color: var(--green); }
    .modal-input { width: 100%; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--brd2); border-radius: 7px; color: var(--cream); font-size: 0.82rem; outline: none; font-family: 'Manrope', sans-serif; transition: border-color 0.15s; }
    .modal-input::placeholder { color: var(--muted); }
    .modal-input:focus { border-color: rgba(86,188,109,0.4); }
    .modal-input.error { border-color: #f87171; }
    .modal-lbl { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; display: block; }
    #modal-nota { width: 100%; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--brd2); border-radius: 7px; color: var(--cream); font-size: 0.8rem; font-style: italic; outline: none; resize: none; font-family: 'Manrope', sans-serif; }
    #modal-nota:focus { border-color: rgba(86,188,109,0.4); }
    #btn-submit-order {
      font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--green); color: var(--noir); font-weight: 700;
      padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; width: 100%;
    }
    #btn-submit-order:hover { background: var(--green2); }
    #btn-submit-order:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── MÉTRICAS ── */
    #view-metricas { flex: 1; overflow-y: auto; padding: 1rem; display: none; }
    .metr-grid { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
    .metr-card { background: rgba(255,255,255,0.025); border: 1px solid var(--brd2); border-radius: 10px; padding: 1rem 1.125rem; display: flex; flex-direction: column; gap: 0.625rem; }
    .metr-title { font-family: 'Syne', sans-serif; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .metr-big { font-family: 'Syne', sans-serif; font-size: 1.75rem; color: var(--green); line-height: 1; }
    .metr-sub { font-size: 0.75rem; color: var(--muted); }
    .metr-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .metr-badge { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .metr-empty { font-size: 0.78rem; color: var(--muted); font-style: italic; }
    .metr-bar-row { display: flex; align-items: center; gap: 0.625rem; }
    .metr-bar-label { font-size: 0.78rem; color: rgba(237,245,238,0.65); width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metr-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .metr-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.6s ease; }
    .metr-bar-val { font-family: 'Syne', sans-serif; font-size: 0.75rem; color: var(--muted); width: 2.5rem; text-align: right; flex-shrink: 0; }
    .metr-hourly { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
    .metr-h-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .metr-h-bar { width: 100%; background: var(--green); border-radius: 2px 2px 0 0; min-height: 2px; opacity: 0.7; }
    .metr-h-lbl { font-size: 0.52rem; color: var(--muted); margin-top: 3px; white-space: nowrap; line-height: 1; }

    /* ── TOAST / CONN ── */
    #toast {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(150%);
      background: var(--green); color: var(--noir); font-weight: 700; font-size: 0.82rem;
      padding: 0.6rem 1.25rem; border-radius: 8px; z-index: 999; transition: transform 0.25s ease;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #conn-bar { background: #dc2626; color: #fff; font-size: 0.72rem; text-align: center; padding: 0.25rem; letter-spacing: 0.04em; display: none; }
    #conn-bar.on { display: block; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="s-auth" style="display:none">
  <img src="./img/logo.png" alt="Cani Ventas" onerror="this.style.display='none'" />
  <h2>Acceso requerido</h2>

  <!-- form-pw: si hay token guardado en localStorage -->
  <div id="form-pw" style="display:none;width:100%;max-width:320px;display:flex;flex-direction:column;gap:.75rem">
    <p>Ingresá tu contraseña maestra para acceder.</p>
    <input type="password" id="auth-pwd" class="auth-form" placeholder="Contraseña maestra"
           style="width:100%;padding:.6rem .875rem;background:var(--card);border:1.5px solid var(--brd2);border-radius:8px;color:var(--cream);font-size:.875rem;outline:none;font-family:'Manrope',sans-serif;transition:border-color .15s"
           onkeydown="if(event.key==='Enter')doAuthLogin()" />
    <button class="auth-btn" onclick="doAuthLogin()">Entrar</button>
    <div id="auth-err"></div>
  </div>

  <!-- form-nopat: no hay token configurado -->
  <div id="form-nopat" style="display:none;flex-direction:column;align-items:center;gap:.75rem">
    <p>Esta sección solo está disponible desde el portal de administración.</p>

(function() {

// PBKDF2 decrypt (same as portal.html)
const _enc = new TextEncoder(), _dec = new TextDecoder();
const _frB64 = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
async function _deriveKey(pwd, salt) {
  const km = await crypto.subtle.importKey('raw', _enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function doAuthLogin() {
  const pwd = document.getElementById('auth-pwd').value;
  if (!pwd) return;
  const stored = localStorage.getItem(LS_PAT);
  if (!stored) return;
  try {
    const { s, i, d } = JSON.parse(stored);
    const key = await _deriveKey(pwd, _frB64(s));
    await crypto.subtle.decrypt({ name:'AES-GCM', iv: _frB64(i) }, key, _frB64(d));
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() }));
    document.getElementById('s-auth').style.display = 'none';
    document.getElementById('s-app').style.display  = 'flex';
  } catch {
    document.getElementById('auth-err').textContent = 'Contraseña incorrecta.';
  }
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
let orders = {}, knownIds = new Set(), catalog = [], manualCart = [], dayCounter = 0;
const ESTADOS = ['pendiente', 'esperando', 'enviado', 'retirado'];
const ESTADO_LBL = { pendiente:'Pendiente', esperando:'Esperando', enviado:'Enviado', retirado:'Retirado' };

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let _ctx;
function beep() {
  try {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = _ctx.createOscillator(), g = _ctx.createGain();
    o.connect(g); g.connect(_ctx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.25, _ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _ctx.currentTime + 0.4);
    o.start(); o.stop(_ctx.currentTime + 0.4);
  } catch(_) {}
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  clearTimeout(_toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n  => '$' + Number(n||0).toLocaleString('es-AR');

function calcTotal(items) {
  return (items||[]).reduce((s, i) => s + (i.precio||0) * (i.qty||1), 0);
}
function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts.toMillis()) / 1000);
  if (s < 60)   return `hace ${s}s`;
  if (s < 3600) return `hace ${Math.floor(s/60)}min`;
  return ts.toDate().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(d) { return d.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' }); }
function startOfDay(d = new Date()) { const c = new Date(d); c.setHours(0,0,0,0); return c.getTime(); }

function switchView(v) {

  if (v === 'historial') renderHistorial();
  if (v === 'metricas')  renderMetricas();
}

// ── RENDER CARD ───────────────────────────────────────────────────────────────
function mkCard(id, p, estado, posIdx, posTotal) {
  const itemsHtml = (p.items||[]).map(i =>
    `<div class="card-item">${i.qty}× ${esc(i.nombre)}</div>`
  ).join('');

  let actions = '';
  if (estado === 'pendiente') {
    actions = `
      <button class="btn-adv btn-esperando" onclick="advance('${id}','esperando')">▶ Esperando</button>
      <button class="btn-icon" onclick="move('${id}',-1)" ${posIdx === 0 ? 'disabled' : ''}>↑</button>
      <button class="btn-icon" onclick="move('${id}', 1)" ${posIdx === posTotal-1 ? 'disabled' : ''}>↓</button>
      <button class="btn-icon btn-del" onclick="del('${id}')">🗑</button>
    `;
  } else if (estado === 'esperando') {
    actions = `
      <button class="btn-adv btn-enviado"  onclick="advance('${id}','enviado')">🚚 Enviado</button>
      <button class="btn-adv btn-retirado" onclick="advance('${id}','retirado')">✓ Retirado</button>
      <button class="btn-icon btn-del" onclick="del('${id}')">🗑</button>
    `;
  } else {
    actions = `<button class="btn-icon btn-del" onclick="del('${id}')">🗑</button>`;
  }

  const el = document.createElement('div');
  el.className = 'card'; el.id = 'card-' + id;
  el.dataset.orden = p.orden || 0;
  el.innerHTML = `
    <div class="card-meta">
      <span class="card-num">#${p.numDia||'—'}</span>
      <span class="card-time">${timeAgo(p.creadoEn)}</span>
    </div>
    <div>${itemsHtml}</div>
    <hr class="card-sep">
    <div class="card-total">${fmt(p.total || calcTotal(p.items))}</div>
    ${p.nombre    ? `<div class="card-cliente">👤 ${esc(p.nombre)}</div>`    : ''}
    ${p.direccion ? `<div class="card-dir">📍 ${esc(p.direccion)}</div>`     : ''}
    ${p.nota      ? `<div class="card-nota">📝 ${esc(p.nota)}</div>`         : ''}
    <div class="card-actions">${actions}</div>
  `;
  return el;
}

// ── RENDER KANBAN ─────────────────────────────────────────────────────────────
function render() {
  const today = startOfDay();
  const cols  = { pendiente:[], esperando:[], enviado:[], retirado:[] };

  Object.values(orders).forEach(p => {
    const ts = p.creadoEn ? p.creadoEn.toMillis() : 0;
    const s  = p.estado || 'pendiente';
    if (!cols[s]) return;
    if ((s === 'enviado' || s === 'retirado') && ts < today) return;
    cols[s].push(p);
  });

  cols.pendiente.sort((a,b) => (a.orden||0)-(b.orden||0));
  cols.esperando.sort((a,b) => (a.orden||0)-(b.orden||0));
  cols.enviado.sort((a,b)   => (b.orden||0)-(a.orden||0));
  cols.retirado.sort((a,b)  => (b.orden||0)-(a.orden||0));

  const active = cols.pendiente.length + cols.esperando.length;
  const badge  = document.getElementById('badge-pend');
  badge.textContent = active;
  badge.style.display = active > 0 ? 'inline-block' : 'none';
  document.title = active > 0 ? `(${active}) Cola — Cani Ventas` : 'Cola de Pedidos — Cani Ventas';

  const emptyIcons = { pendiente:'📋', esperando:'⏳', enviado:'🚚', retirado:'✅' };
  const emptyTxts  = { pendiente:'Sin pedidos', esperando:'Sin pedidos', enviado:'Nada hoy', retirado:'Nada hoy' };

  ESTADOS.forEach(s => {
    const body = document.getElementById('col-' + s);
    document.getElementById('cnt-' + s).textContent = cols[s].length;
    body.innerHTML = '';
    if (!cols[s].length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">${emptyIcons[s]}</div><div class="empty-txt">${emptyTxts[s]}</div></div>`;
      return;
    }
    cols[s].forEach((p, i, arr) => body.appendChild(mkCard(p.id, p, s, i, arr.length)));
  });
}

// ── RENDER HISTORIAL ──────────────────────────────────────────────────────────
function renderHistorial() {
  const days = {};
  Object.values(orders).forEach(p => {
    if (!p.creadoEn) return;
    const d = p.creadoEn.toDate(); d.setHours(0,0,0,0);
    const key = d.getTime();
    if (!days[key]) days[key] = { date: new Date(d), list:[] };
    days[key].list.push(p);
  });
  const sorted = Object.entries(days).sort(([a],[b]) => Number(b)-Number(a));
  const hist = document.getElementById('hist-content');
  if (!sorted.length) {
    hist.innerHTML = '<p style="text-align:center;opacity:.25;padding:3rem;font-family:Syne,sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.8rem">Sin historial</p>';
    return;
  }
  hist.innerHTML = sorted.map(([key, {date, list}]) => {
    const isToday = startOfDay() === Number(key);
    const total   = list.reduce((s,p) => s+(p.total||calcTotal(p.items)), 0);
    const rows    = list.sort((a,b) => (a.numDia||0)-(b.numDia||0)).map(p => {
      const items_txt = (p.items||[]).map(i => `${i.qty}× ${i.nombre}`).join(', ');
      return `<div class="hist-row">
        <div class="hist-num">#${p.numDia||'—'}</div>
        <div class="hist-items">
          ${p.nombre ? `<div style="font-size:.75rem;font-weight:600;margin-bottom:.2rem">👤 ${esc(p.nombre)}${p.direccion?` · 📍 ${esc(p.direccion)}`:''}</div>` : ''}
          ${esc(items_txt)}${p.nota?`<div class="hist-nota">📝 ${esc(p.nota)}</div>`:''}
        </div>
        <div class="hist-right">
          <div class="hist-total">${fmt(p.total||calcTotal(p.items))}</div>
          <div class="hist-estado ${p.estado||'pendiente'}">${ESTADO_LBL[p.estado||'pendiente']}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="hist-day">
      <div class="hist-day-hdr">
        <span>${isToday?'Hoy':fmtDate(date)}</span>
        <span>${list.length} pedido${list.length!==1?'s':''} · ${fmt(total)}</span>
      </div>
      <div class="hist-day-body">${rows}</div>
    </div>`;
  }).join('');
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Fecha','Hora','#Pedido','Nombre','Dirección','Productos','Total','Nota','Estado']];
  Object.values(orders).filter(p => p.creadoEn)
    .sort((a,b) => a.creadoEn.toMillis()-b.creadoEn.toMillis())
    .forEach(p => {
      const d = p.creadoEn.toDate();
      rows.push([
        d.toLocaleDateString('es-AR'),
        d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' }),
        p.numDia||'', p.nombre||'', p.direccion||'',
        (p.items||[]).map(i=>`${i.qty}x ${i.nombre}`).join(' | '),
        p.total||calcTotal(p.items), p.nota||'',
        ESTADO_LBL[p.estado||'pendiente']
      ]);
    });
  const csv = rows.map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' }));
  a.download = `caniventas-pedidos-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('✅ CSV descargado');
}

// ── MÉTRICAS ──────────────────────────────────────────────────────────────────
function renderMetricas() {
  const today  = startOfDay();
  const all    = Object.values(orders).filter(p => p.creadoEn);
  const todayO = all.filter(p => p.creadoEn.toMillis() >= today);
  const todayT = todayO.reduce((s,p) => s+(p.total||calcTotal(p.items)), 0);
  const todayC = { pendiente:0, esperando:0, enviado:0, retirado:0 };
  todayO.forEach(p => { if (todayC[p.estado]!==undefined) todayC[p.estado]++; });

  const prodCounts = {};
  all.forEach(p => { (p.items||[]).forEach(i => {
    if (!prodCounts[i.nombre]) prodCounts[i.nombre] = { nombre:i.nombre, qty:0 };
    prodCounts[i.nombre].qty += i.qty||1;
  }); });
  const topProds = Object.values(prodCounts).sort((a,b) => b.qty-a.qty).slice(0,8);
  const maxQty   = topProds.length ? topProds[0].qty : 1;

  const byHour = Array(24).fill(0);
  all.forEach(p => { byHour[p.creadoEn.toDate().getHours()]++; });
  const maxH = Math.max(...byHour, 1);

  const stateColor = { pendiente:'rgba(239,68,68,', esperando:'rgba(245,158,11,', enviado:'rgba(59,130,246,', retirado:'rgba(16,185,129,' };

  document.getElementById('view-metricas').innerHTML = `
    <div class="metr-grid">
      <div class="metr-card">
        <div class="metr-title">Hoy · ${todayO.length} pedido${todayO.length!==1?'s':''}</div>
        <div class="metr-big">${fmt(todayT)}</div>
        <div class="metr-row">
          ${Object.entries(todayC).map(([k,v]) => `<div class="metr-badge" style="background:${stateColor[k]}0.15);color:${stateColor[k]}0.85)">${v} ${ESTADO_LBL[k]}</div>`).join('')}
        </div>
      </div>
      <div class="metr-card">
        <div class="metr-title">Productos más pedidos · todos los tiempos</div>
        ${!topProds.length ? '<div class="metr-empty">Sin datos aún</div>' :
          topProds.map(p => `<div class="metr-bar-row">
            <div class="metr-bar-label" title="${esc(p.nombre)}">${esc(p.nombre)}</div>
            <div class="metr-bar-track"><div class="metr-bar-fill" style="width:${(p.qty/maxQty*100).toFixed(1)}%"></div></div>
            <div class="metr-bar-val">${p.qty}×</div>
          </div>`).join('')}
      </div>
      <div class="metr-card">
        <div class="metr-title">Distribución horaria · todos los pedidos</div>
        <div class="metr-hourly">
          ${byHour.map((c,h) => `<div class="metr-h-col" title="${c} pedido${c!==1?'s':''} · ${String(h).padStart(2,'0')}:00hs">
            <div class="metr-h-bar" style="height:${Math.max(c>0?3:0,Math.round(c/maxH*56))}px"></div>
            <div class="metr-h-lbl">${h%4===0?h:''}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="metr-card">
        <div class="metr-title">Acumulado total</div>
        <div class="metr-big">${fmt(all.reduce((s,p)=>s+(p.total||calcTotal(p.items)),0))}</div>
        <div class="metr-sub">${all.length} pedido${all.length!==1?'s':''} registrados</div>
      </div>
    </div>`;
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function advance(id, toState) {
  const p = orders[id]; if (!p) return;
  db.collection('pedidos').doc(id).update({ estado: toState, orden: Date.now() })
    .then(() => toast({ esperando:'⏳ Esperando', enviado:'🚚 Enviado', retirado:'✅ Retirado' }[toState]||'Actualizado'));
}

function del(id) {
  if (!confirm('¿Eliminar este pedido?')) return;
  db.collection('pedidos').doc(id).delete().then(() => toast('Pedido eliminado'));
}

function move(id, dir) {
  const p = orders[id]; if (!p || p.estado !== 'pendiente') return;
  const pend = Object.values(orders)
    .filter(o => o.estado === 'pendiente')
    .sort((a, b) => (a.orden||0)-(b.orden||0));
  const idx = pend.findIndex(o => o.id === id);
  const si  = idx + dir;
  if (si < 0 || si >= pend.length) return;
  const newOrdens = pend.map((_,i) => i);
  newOrdens[idx] = si; newOrdens[si] = idx;
  const batch = db.batch();
  pend.forEach((o, i) => batch.update(db.collection('pedidos').doc(o.id), { orden: newOrdens[i] }));
  batch.commit();
}

// ── LISTENER ──────────────────────────────────────────────────────────────────
db.collection('pedidos').orderBy('creadoEn','desc').limit(500)
  .onSnapshot(snap => {
    snap.docChanges().forEach(ch => {
      const id = ch.doc.id, data = { id, ...ch.doc.data() };
      if (ch.type === 'added') {
        if (!data.numDia) {
          const ts = data.creadoEn ? data.creadoEn.toMillis() : 0;
          if (ts >= startOfDay()) {
            dayCounter++;
            db.collection('pedidos').doc(id).update({ numDia: dayCounter }).catch(()=>{});
            data.numDia = dayCounter;
          }
        }
        if (!knownIds.has(id) && knownIds.size > 0) {
          beep(); toast('🛎 Nuevo pedido recibido!');
          document.title = '🛎 Nuevo pedido! — Cola';
          setTimeout(render, 50);
        }
        knownIds.add(id);
      }
      if (ch.type === 'removed') { delete orders[id]; knownIds.delete(id); }
      else orders[id] = data;
    });
    render();
  }, () => document.getElementById('conn-bar').classList.add('on'));

// ── MODAL ─────────────────────────────────────────────────────────────────────
fetch('./productos.json').then(r => r.json()).then(d => {
  d.categorias.forEach(cat => {
    (cat.productos||[]).forEach(p => {
      if (p.disponible === false) return;
      catalog.push({ nombre: p.nombre, precio: p.precio, catLabel: `${cat.emoji||''} ${cat.nombre}` });
    });
  });
  filterProds('');
}).catch(() => filterProds(''));

function filterProds(q) {
  const res      = document.getElementById('modal-results');
  const filtered = q.trim() ? catalog.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase())) : catalog;
  if (!filtered.length) {
    res.innerHTML = '<div style="font-size:.78rem;opacity:.25;padding:.5rem .75rem">Sin resultados</div>';
    return;
  }
  res.innerHTML = '';
  filtered.slice(0, 15).forEach(p => {
    const d = document.createElement('div');
    d.className = 'prod-opt';
    d.innerHTML = `<span class="prod-opt-name">${esc(p.nombre)}</span><span class="prod-opt-price">${fmt(p.precio)}</span>`;
    d.onclick = () => addToCart(p);
    res.appendChild(d);
  });
}

function addToCart(p) {
  const ex = manualCart.find(i => i.nombre === p.nombre);
  if (ex) ex.qty++; else manualCart.push({ ...p, qty:1 });
  renderManualCart();
}

function renderManualCart() {
  const cart   = document.getElementById('modal-cart');
  const items  = document.getElementById('cart-items-modal');
  const totalEl= document.getElementById('modal-total');
  const btn    = document.getElementById('btn-submit-order');
  if (!manualCart.length) { cart.style.display='none'; btn.disabled=true; return; }
  cart.style.display='flex'; btn.disabled=false;
  items.innerHTML = manualCart.map((i,idx) => `
    <div class="cart-row">
      <span class="cart-name">${esc(i.nombre)}</span>
      <div class="cart-qty">
        <button class="btn-qty" onclick="qtyChange(${idx},-1)">−</button>
        <span class="cart-qty-num">${i.qty}</span>
        <button class="btn-qty" onclick="qtyChange(${idx}, 1)">+</button>
      </div>
      <span style="font-family:Syne,sans-serif;font-size:.8rem;color:var(--green);min-width:4rem;text-align:right">${fmt(i.precio*i.qty)}</span>
    </div>`).join('');
  totalEl.textContent = fmt(manualCart.reduce((s,i) => s+i.precio*i.qty, 0));
}

function qtyChange(idx, d) {
  manualCart[idx].qty += d;
  if (manualCart[idx].qty <= 0) manualCart.splice(idx, 1);
  renderManualCart();
}

async function submitManualOrder() {
  if (!manualCart.length) return;
  const nombreEl    = document.getElementById('modal-nombre');
  const direccionEl = document.getElementById('modal-direccion');
  const nombre      = nombreEl.value.trim();
  const direccion   = direccionEl.value.trim();
  nombreEl.classList.toggle('error', !nombre);
  direccionEl.classList.toggle('error', !direccion);
  if (!nombre || !direccion) { if (!nombre) nombreEl.focus(); else direccionEl.focus(); return; }
  const nota  = document.getElementById('modal-nota').value.trim();
  const total = manualCart.reduce((s,i) => s+i.precio*i.qty, 0);
  document.getElementById('btn-submit-order').disabled = true;
  try {
    await db.collection('pedidos').add({
      creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
      orden: Date.now(), estado: 'pendiente', total, nota, nombre, direccion, origen: 'manual',
      items: manualCart.map(i => ({ nombre:i.nombre, precio:i.precio, qty:i.qty, catLabel:i.catLabel||'' }))
    });
    toast('✅ Pedido agregado a la cola');
    closeModal();
  } catch(e) {
    toast('Error: ' + e.message);
    document.getElementById('btn-submit-order').disabled = false;
  }
}

function openModal() {
  manualCart = [];
  ['modal-nota','modal-nombre','modal-direccion'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-nombre').classList.remove('error');
  document.getElementById('modal-direccion').classList.remove('error');
  document.getElementById('modal-search').value = '';
  filterProds('');
  renderManualCart();
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function handleBgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

setInterval(render, 30000);
</script>
</body>
